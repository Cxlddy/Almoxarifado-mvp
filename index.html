<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado | Sistema Corporativo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --side:280px;--radius:22px;--bg:#f5f7fb;--surface:rgba(255,255,255,.88);
      --border:rgba(15,23,42,.08);--muted:#64748b;--dark:#0f172a;--primary:#2563eb;
      --shadow:0 18px 55px rgba(15,23,42,.09);--shadow2:0 10px 30px rgba(15,23,42,.07)
    }
    [data-bs-theme=dark]{--bg:#0b1220;--surface:rgba(15,23,42,.9);--border:rgba(148,163,184,.18);--muted:#94a3b8;--dark:#e2e8f0;--shadow:0 20px 70px rgba(0,0,0,.32);--shadow2:0 14px 45px rgba(0,0,0,.22)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--dark);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at 10% 0,rgba(37,99,235,.13),transparent 28rem),radial-gradient(circle at 100% 100%,rgba(14,165,233,.12),transparent 30rem),var(--bg);overflow-x:hidden}
    a{text-decoration:none}.fw-black{font-weight:850}.text-muted2{color:var(--muted)!important}.app-shell{display:flex;min-height:100vh}
    .sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);z-index:1020;padding:16px;background:rgba(15,23,42,.97);color:#fff;box-shadow:16px 0 45px rgba(15,23,42,.18)}
    .brand{display:flex;align-items:center;gap:12px;padding:10px 8px 20px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
    .brand-icon{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#0ea5e9);box-shadow:0 14px 28px rgba(37,99,235,.35);font-size:22px}
    .brand small{color:rgba(255,255,255,.55)}.nav-label{margin:18px 12px 7px;color:rgba(255,255,255,.42);font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:800}
    .app-nav .nav-link{display:flex;align-items:center;gap:13px;color:rgba(255,255,255,.72);padding:13px 14px;margin-bottom:5px;border-radius:16px;font-weight:750;transition:.18s ease}
    .app-nav .nav-link:hover,.app-nav .nav-link.active{background:#2563eb;color:#fff;transform:translateX(3px)}.app-nav i{width:20px;text-align:center}
    .main{margin-left:var(--side);flex:1;min-width:0;padding:22px}.topbar{position:sticky;top:16px;z-index:1000;background:var(--surface);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
    .surface{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow2)}.page-title{font-weight:850;letter-spacing:-.04em;margin:0;font-size:clamp(1.35rem,3vw,2.05rem)}.page-subtitle{margin:2px 0 0;color:var(--muted);font-size:.92rem}
    .stat-card{min-height:138px;padding:20px;transition:.22s ease;overflow:hidden}.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}.stat-icon{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;background:rgba(37,99,235,.12);color:#1d4ed8;font-size:1.35rem}.stat-value{font-weight:850;font-size:2.1rem;letter-spacing:-.05em}.stat-label{font-size:.85rem;color:var(--muted);font-weight:750}
    .soft-badge{border-radius:999px;padding:.42rem .7rem;font-size:.75rem;font-weight:800;display:inline-flex;align-items:center;gap:.35rem}.badge-soft-primary{background:rgba(37,99,235,.12);color:#1d4ed8}.badge-soft-success{background:rgba(22,163,74,.12);color:#15803d}.badge-soft-danger{background:rgba(220,38,38,.12);color:#b91c1c}.badge-soft-warning{background:rgba(245,158,11,.15);color:#b45309}.badge-soft-secondary{background:rgba(100,116,139,.14);color:#475569}
    .table{--bs-table-bg:transparent;vertical-align:middle}.table thead th{font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:rgba(148,163,184,.08);border-bottom:1px solid var(--border)}.table td{border-color:var(--border);padding:.9rem .75rem}.table-hover tbody tr{transition:.15s}.table-hover tbody tr:hover{background:rgba(37,99,235,.045)}
    .form-control,.form-select{border-radius:14px;border-color:rgba(100,116,139,.25);min-height:45px}.form-control:focus,.form-select:focus{border-color:rgba(37,99,235,.45);box-shadow:0 0 0 .22rem rgba(37,99,235,.12)}
    .btn{border-radius:14px;font-weight:780;min-height:43px}.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-color:transparent;box-shadow:0 10px 24px rgba(37,99,235,.22)}.btn-icon{width:43px;padding:0;display:inline-grid;place-items:center}
    .search-box{position:relative}.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}.search-box input{padding-left:42px}.empty-state{text-align:center;padding:48px 16px;color:var(--muted)}.empty-state i{font-size:42px;color:rgba(37,99,235,.38);display:block;margin-bottom:10px}
    .skeleton{min-height:130px;border-radius:20px;background:linear-gradient(90deg,rgba(148,163,184,.14),rgba(148,163,184,.28),rgba(148,163,184,.14));background-size:240% 100%;animation:shimmer 1.15s linear infinite}@keyframes shimmer{to{background-position:-200% 0}}.fade-page{animation:pageIn .28s ease both}@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .modal-content,.offcanvas{border-radius:22px;border:1px solid var(--border)}.mobile-nav-btn{display:none}.auth-shell{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;background:linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,64,175,.92)),url("data:image/svg+xml,%3Csvg width='160' height='160' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23fff' stroke-opacity='.08'%3E%3Cpath d='M0 80h160M80 0v160'/%3E%3Ccircle cx='80' cy='80' r='42'/%3E%3C/g%3E%3C/svg%3E")}
    .auth-brand{color:#fff;display:flex;flex-direction:column;justify-content:space-between;min-height:100vh;padding:clamp(2rem,6vw,5rem)}.auth-brand h1{font-size:clamp(2.4rem,4vw,4.5rem);line-height:1.05;font-weight:850;letter-spacing:-.06em;max-width:720px}.auth-brand p{color:rgba(255,255,255,.78);max-width:620px;font-size:1.08rem}.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:1.5rem;background:rgba(255,255,255,.04);backdrop-filter:blur(18px)}
    .auth-card{width:min(100%,460px);background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.55);border-radius:24px;box-shadow:0 30px 100px rgba(0,0,0,.28);padding:clamp(1.35rem,4vw,2.3rem);animation:rise .55s ease both}@keyframes rise{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}[data-bs-theme=dark] .auth-card{background:rgba(15,23,42,.94);border-color:rgba(148,163,184,.24)}
    @media(max-width:991.98px){.sidebar{display:none}.main{margin-left:0;padding:12px}.topbar{top:10px;border-radius:18px}.mobile-nav-btn{display:inline-grid}.stat-card{min-height:120px}.auth-shell{grid-template-columns:1fr}.auth-brand{min-height:auto;padding:2rem 1.2rem 0}.auth-brand .bottom-note{display:none}.auth-wrap{min-height:auto;padding:1.1rem}}
    @media(max-width:575.98px){.topbar{padding:13px}.surface{border-radius:18px}.table-responsive{border-radius:16px}.stat-value{font-size:1.65rem}.auth-card{margin-bottom:1rem}}
  </style>
</head>

<body>
  <div id="root"></div>
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastArea" style="z-index:2000"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = 'https://almoxarifado-backend-tan.vercel.app';

    const ROUTES = [
      {id:'dashboard',label:'Dashboard',icon:'bi-speedometer2'},
      {id:'produtos',label:'Produtos',icon:'bi-box-seam'},
      {id:'estoque',label:'Estoque',icon:'bi-boxes'},
      {id:'solicitacoes',label:'Solicitações',icon:'bi-clipboard2-check'},
      {id:'cadastros',label:'Cadastros',icon:'bi-folder2-open'},
      {id:'usuarios',label:'Usuários',icon:'bi-people'}
    ];

    const auth = {
      token: localStorage.getItem('almox_token'),
      refreshToken: localStorage.getItem('almox_refresh_token'),
      usuario: JSON.parse(localStorage.getItem('almox_usuario') || 'null')
    };

    const state = {categorias:[],unidades:[],produtos:[],saldo:[],solicitacoes:[],locais:[],fornecedores:[],setores:[],centrosCusto:[],usuarios:[],currentPage:'dashboard'};
    const root = document.getElementById('root');
    const byId = id => document.getElementById(id);

    function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
    function n(v){return Number(v||0).toLocaleString('pt-BR',{maximumFractionDigits:3})}
    function d(v){if(!v)return'-';const dt=new Date(v);return Number.isNaN(dt.getTime())?'-':dt.toLocaleDateString('pt-BR')}
    function options(items,key='nome'){return items.map(i=>`<option value="${esc(i.id)}">${esc(i[key]||i.nome||i.codigo||i.id)}</option>`).join('')}
    function saveSession(data){auth.token=data.access_token;auth.refreshToken=data.refresh_token;auth.usuario=data.usuario;localStorage.setItem('almox_token',data.access_token);localStorage.setItem('almox_refresh_token',data.refresh_token||'');localStorage.setItem('almox_usuario',JSON.stringify(data.usuario))}
    function clearSession(){auth.token=null;auth.refreshToken=null;auth.usuario=null;localStorage.removeItem('almox_token');localStorage.removeItem('almox_refresh_token');localStorage.removeItem('almox_usuario')}

    function toast(msg,type='success'){
      const area=byId('toastArea'), id='t'+Date.now();
      const bg=type==='success'?'text-bg-success':type==='warning'?'text-bg-warning':'text-bg-danger';
      const icon=type==='success'?'bi-check-circle':type==='warning'?'bi-exclamation-triangle':'bi-x-circle';
      area.insertAdjacentHTML('beforeend',`<div id="${id}" class="toast ${bg} border-0 shadow"><div class="d-flex"><div class="toast-body"><i class="bi ${icon} me-2"></i>${esc(msg)}</div><button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);
      const el=byId(id); new bootstrap.Toast(el,{delay:4200}).show(); el.addEventListener('hidden.bs.toast',()=>el.remove());
    }

    async function api(endpoint, options={}){
      const headers={'Content-Type':'application/json',...(options.headers||{})};
      if(auth.token) headers.Authorization=`Bearer ${auth.token}`;
      const res=await fetch(`${API_URL}${endpoint}`,{...options,headers});
      const ct=res.headers.get('content-type')||'';
      const payload=ct.includes('application/json')?await res.json():await res.text();
      if(!res.ok){
        const msg=typeof payload==='string'?payload:(payload.erro||payload.mensagem||'Erro na requisição');
        if(res.status===401||res.status===403){clearSession();renderAuth('login',msg)}
        throw new Error(msg);
      }
      return payload;
    }

    async function loadAll(){
      const map=[['/categorias','categorias'],['/produtos','produtos'],['/saldo-estoque','saldo'],['/solicitacoes','solicitacoes'],['/cadastros/unidades-medida','unidades'],['/cadastros/locais-estoque','locais'],['/cadastros/fornecedores','fornecedores'],['/cadastros/setores','setores'],['/cadastros/centros-custo','centrosCusto'],['/usuarios','usuarios']];
      const results=await Promise.allSettled(map.map(([url])=>api(url)));
      results.forEach((r,i)=>state[map[i][1]]=r.status==='fulfilled'&&Array.isArray(r.value)?r.value:[]);
    }

    function badge(status){
      const m={rascunho:['secondary','Rascunho'],enviada:['warning','Enviada'],aprovada:['success','Aprovada'],recusada:['danger','Recusada'],atendida_parcial:['warning','Atendida parcial'],atendida:['success','Atendida'],cancelada:['secondary','Cancelada']};
      const [type,label]=m[status]||['secondary',status||'-'];
      return `<span class="soft-badge badge-soft-${type}">${esc(label)}</span>`;
    }

    function route(){const h=location.hash.replace('#/','');const q=new URLSearchParams(location.search);if(q.get('resetar_senha')==='true'||location.hash.includes('type=recovery'))return'resetar-senha';return h?h.split('?')[0]:(auth.token?'dashboard':'login')}
    function tokens(){const h=location.hash.startsWith('#')?location.hash.slice(1):location.hash;const p=new URLSearchParams(h);return{access_token:p.get('access_token'),refresh_token:p.get('refresh_token')}}

    function renderAuth(mode='login',error=''){
      const forgot=mode==='esqueci-senha', reset=mode==='resetar-senha';
      const title=forgot?'Recuperar senha':reset?'Definir nova senha':'Entrar no sistema';
      const sub=forgot?'Informe seu email para receber as instruções de recuperação.':reset?'Crie uma nova senha segura para acessar o sistema.':'Acesse com seu usuário autorizado.';
      root.innerHTML=`<section class="auth-shell"><div class="auth-brand"><div><div class="d-inline-flex align-items-center gap-2 mb-4"><span class="brand-icon"><i class="bi bi-box-seam"></i></span><span class="fw-bold fs-5">Almoxarifado</span></div><h1>Gestão de materiais com controle, rastreabilidade e autorização.</h1><p class="mt-4">Controle produtos, movimentações, solicitações internas e liberações por WhatsApp em uma interface corporativa simples e rápida.</p></div><div class="bottom-note small text-white-50"><i class="bi bi-shield-check me-2"></i>Sessão protegida por autenticação.</div></div><div class="auth-wrap"><div class="auth-card"><div class="mb-4"><span class="soft-badge badge-soft-primary mb-3"><i class="bi bi-building-lock"></i>Sistema interno</span><h2 class="fw-black mb-1">${title}</h2><p class="text-muted2 mb-0">${sub}</p></div>${forgot?forgotForm(error):reset?resetForm(error):loginForm(error)}</div></div></section>`;
      if(forgot) byId('forgotForm').addEventListener('submit',handleForgot); else if(reset) byId('resetForm').addEventListener('submit',handleReset); else byId('loginForm').addEventListener('submit',handleLogin);
    }
    function loginForm(e){return`<form id="loginForm" class="vstack gap-3"><label class="form-label">Email<input class="form-control mt-1" name="email" type="email" autocomplete="email" required></label><label class="form-label">Senha<input class="form-control mt-1" name="senha" type="password" autocomplete="current-password" required></label>${e?`<div class="alert alert-danger mb-0">${esc(e)}</div>`:''}<button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Entrar</button><a class="text-center small fw-semibold" href="#/esqueci-senha">Esqueci minha senha</a></form>`}
    function forgotForm(e){return`<form id="forgotForm" class="vstack gap-3"><label class="form-label">Email<input class="form-control mt-1" name="email" type="email" required></label>${e?`<div class="alert alert-danger mb-0">${esc(e)}</div>`:''}<div id="forgotMessage"></div><button class="btn btn-primary w-100" type="submit"><i class="bi bi-envelope-arrow-up me-2"></i>Enviar instruções</button><a class="text-center small fw-semibold" href="#/login">Voltar para login</a></form>`}
    function resetForm(e){const t=tokens();return`<form id="resetForm" class="vstack gap-3"><label class="form-label">Nova senha<input class="form-control mt-1" name="senha" type="password" minlength="6" required></label><label class="form-label">Confirmar nova senha<input class="form-control mt-1" name="confirmar_senha" type="password" minlength="6" required></label><input type="hidden" name="access_token" value="${esc(t.access_token||'')}"><input type="hidden" name="refresh_token" value="${esc(t.refresh_token||'')}">${e?`<div class="alert alert-danger mb-0">${esc(e)}</div>`:''}<div id="resetMessage"></div><button class="btn btn-primary w-100" type="submit"><i class="bi bi-key me-2"></i>Salvar nova senha</button><a class="text-center small fw-semibold" href="#/login">Voltar para login</a></form>`}

    async function handleLogin(ev){ev.preventDefault();const form=ev.currentTarget,btn=form.querySelector('button');btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';try{const payload=Object.fromEntries(new FormData(form));const res=await fetch(`${API_URL}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const body=await res.json();if(!res.ok)throw new Error(body.erro||body.mensagem||'Erro ao fazer login');saveSession(body);history.replaceState(null,'','#/dashboard');renderShell();await navigate('dashboard')}catch(err){renderAuth('login',err.message)}}
    async function handleForgot(ev){ev.preventDefault();const box=byId('forgotMessage');try{await api('/auth/forgot-password',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(ev.currentTarget)))});box.innerHTML='<div class="alert alert-success mb-0">Se o email estiver cadastrado, as instruções serão enviadas.</div>'}catch(err){box.innerHTML=`<div class="alert alert-danger mb-0">${esc(err.message)}</div>`}}
    async function handleReset(ev){ev.preventDefault();const data=Object.fromEntries(new FormData(ev.currentTarget));const box=byId('resetMessage');if(data.senha!==data.confirmar_senha){box.innerHTML='<div class="alert alert-danger mb-0">As senhas não conferem.</div>';return}if(!data.access_token||!data.refresh_token){box.innerHTML='<div class="alert alert-danger mb-0">Link de recuperação inválido ou expirado.</div>';return}try{await api('/auth/reset-password',{method:'POST',body:JSON.stringify({access_token:data.access_token,refresh_token:data.refresh_token,senha:data.senha})});box.innerHTML='<div class="alert alert-success mb-0">Senha redefinida. Faça login novamente.</div>';clearSession();setTimeout(()=>{history.replaceState(null,'','#/login');renderAuth('login')},1700)}catch(err){box.innerHTML=`<div class="alert alert-danger mb-0">${esc(err.message)}</div>`}}

    function logout(){clearSession();history.replaceState(null,'','#/login');renderAuth('login')}
    function sidebar(){const nav=ROUTES.map(r=>`<a href="#/${r.id}" class="nav-link ${state.currentPage===r.id?'active':''}" data-route="${r.id}"><i class="bi ${r.icon}"></i><span>${r.label}</span></a>`).join('');return`<div class="brand"><div class="brand-icon"><i class="bi bi-box-seam"></i></div><div><strong>Almoxarifado</strong><br><small>Controle corporativo</small></div></div><div class="nav-label">Menu</div><nav class="app-nav">${nav}</nav><div class="small text-white-50 px-2 mt-4"><i class="bi bi-whatsapp me-2"></i>Autorizações integradas</div>`}
    function renderShell(){root.innerHTML=`<div class="app-shell"><aside class="sidebar">${sidebar()}</aside><div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="mobileMenu"><div class="offcanvas-body p-3">${sidebar()}</div></div><main class="main"><header class="topbar mb-4"><div class="d-flex align-items-center justify-content-between gap-3"><div class="d-flex align-items-center gap-2"><button class="btn btn-light btn-icon mobile-nav-btn" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"><i class="bi bi-list"></i></button><div><h1 class="page-title" id="pageTitle">Dashboard</h1><p class="page-subtitle" id="pageSubtitle">Visão geral</p></div></div><div class="d-flex align-items-center gap-2"><button class="btn btn-light btn-icon" id="themeBtn"><i class="bi bi-moon-stars"></i></button><div class="dropdown"><button class="btn btn-light d-flex align-items-center gap-2" data-bs-toggle="dropdown"><span class="rounded-circle bg-primary text-white" style="width:32px;height:32px;display:grid;place-items:center">${esc((auth.usuario?.nome||'U').slice(0,1).toUpperCase())}</span><span class="d-none d-md-inline small fw-bold">${esc(auth.usuario?.nome||'Usuário')}</span></button><ul class="dropdown-menu dropdown-menu-end shadow border-0"><li><h6 class="dropdown-header">${esc(auth.usuario?.email||'')}</h6></li><li><span class="dropdown-item-text small text-secondary">Perfil: ${esc(auth.usuario?.perfil||'-')}</span></li><li><hr class="dropdown-divider"></li><li><button class="dropdown-item text-danger" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Sair</button></li></ul></div></div></div></header><section id="app" class="fade-page"></section></main></div>`;byId('logoutBtn').addEventListener('click',logout);byId('themeBtn').addEventListener('click',()=>{const next=document.documentElement.getAttribute('data-bs-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-bs-theme',next);localStorage.setItem('almox_theme',next)});document.querySelectorAll('[data-route]').forEach(a=>a.addEventListener('click',ev=>{ev.preventDefault();history.pushState(null,'',`#/${a.dataset.route}`);navigate(a.dataset.route);const off=bootstrap.Offcanvas.getInstance(byId('mobileMenu'));if(off)off.hide()}))}
    function meta(title,sub){byId('pageTitle').textContent=title;byId('pageSubtitle').textContent=sub;document.querySelectorAll('[data-route]').forEach(a=>a.classList.toggle('active',a.dataset.route===state.currentPage))}
    function loading(){byId('app').innerHTML=`<div class="row g-3"><div class="col-md-3"><div class="skeleton"></div></div><div class="col-md-3"><div class="skeleton"></div></div><div class="col-md-3"><div class="skeleton"></div></div><div class="col-md-3"><div class="skeleton"></div></div><div class="col-12"><div class="skeleton" style="min-height:320px"></div></div></div>`}
    async function navigate(r){state.currentPage=r;loading();try{await loadAll();({dashboard:renderDashboard,produtos:renderProdutos,estoque:renderEstoque,solicitacoes:renderSolicitacoes,cadastros:renderCadastros,usuarios:renderUsuarios}[r]||renderDashboard)();meta(byId('pageTitle').textContent,byId('pageSubtitle').textContent)}catch(err){byId('app').innerHTML=`<div class="surface p-4"><div class="empty-state"><i class="bi bi-cloud-slash"></i><h5>Não foi possível carregar</h5><p>${esc(err.message)}</p><button class="btn btn-primary" onclick="navigate('${r}')">Tentar novamente</button></div></div>`}}
    function empty(title,icon='bi-inbox',sub='Nada para exibir no momento.'){return`<div class="empty-state"><i class="bi ${icon}"></i><h6 class="fw-bold">${esc(title)}</h6><p class="small mb-0">${esc(sub)}</p></div>`}
    function stat(label,value,icon,type='primary'){return`<div class="col-6 col-lg-3"><div class="surface stat-card"><div class="d-flex justify-content-between align-items-start"><div><div class="stat-label">${esc(label)}</div><div class="stat-value mt-2">${value}</div></div><div class="stat-icon badge-soft-${type}"><i class="bi ${icon}"></i></div></div></div></div>`}

    function renderDashboard(){meta('Dashboard','Visão geral do almoxarifado');const low=state.saldo.filter(i=>i.abaixo_estoque_minimo), pend=state.solicitacoes.filter(i=>['enviada','aprovada','atendida_parcial'].includes(i.status)), total=state.saldo.reduce((s,i)=>s+Number(i.saldo_atual||0),0);byId('app').innerHTML=`<div class="row g-3 mb-4">${stat('Produtos',state.produtos.length,'bi-box-seam')}${stat('Itens em estoque',n(total),'bi-boxes','success')}${stat('Baixo estoque',low.length,'bi-exclamation-triangle',low.length?'danger':'success')}${stat('Pendentes',pend.length,'bi-hourglass-split','warning')}</div><div class="row g-3"><div class="col-lg-7"><div class="surface p-3 p-md-4 h-100"><div class="d-flex justify-content-between align-items-center mb-3"><div><h5 class="fw-bold mb-1">Solicitações recentes</h5><p class="text-muted2 small mb-0">Últimas movimentações do fluxo interno.</p></div><button class="btn btn-sm btn-primary" onclick="openSolicitacaoModal()"><i class="bi bi-plus-lg me-1"></i>Nova</button></div>${state.solicitacoes.length?tableSolicitacoes(state.solicitacoes.slice(0,6),true):empty('Nenhuma solicitação','bi-clipboard2')}</div></div><div class="col-lg-5"><div class="surface p-3 p-md-4 h-100"><div class="d-flex justify-content-between align-items-center mb-3"><div><h5 class="fw-bold mb-1">Atenção ao estoque</h5><p class="text-muted2 small mb-0">Itens abaixo do mínimo.</p></div><span class="soft-badge ${low.length?'badge-soft-danger':'badge-soft-success'}">${low.length} itens</span></div>${low.length?tableSaldo(low.slice(0,6),true):empty('Nenhum item crítico','bi-check-circle')}</div></div></div>${solicitacaoModal()}${atenderModal()}`;attachSolicitacaoForms()}

    function renderProdutos(){meta('Produtos','Cadastro e consulta de materiais');byId('app').innerHTML=`<div class="surface p-3 p-md-4"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3"><div><h5 class="fw-bold mb-1">Produtos cadastrados</h5><p class="text-muted2 small mb-0">Materiais, categorias e estoque mínimo.</p></div><div class="d-flex gap-2"><div class="search-box"><i class="bi bi-search"></i><input class="form-control" id="produtoSearch" placeholder="Buscar produto..."></div><button class="btn btn-primary" onclick="openProdutoModal()"><i class="bi bi-plus-lg me-1"></i>Novo</button></div></div><div id="produtosTable">${tableProdutos(state.produtos)}</div></div>${produtoModal()}`;byId('produtoSearch').addEventListener('input',e=>{const q=e.target.value.toLowerCase();byId('produtosTable').innerHTML=tableProdutos(state.produtos.filter(p=>[p.nome,p.codigo_interno,p.categorias?.nome].join(' ').toLowerCase().includes(q)))});byId('produtoForm').addEventListener('submit',saveProduto)}
    function tableProdutos(items){if(!items.length)return empty('Nenhum produto cadastrado','bi-box-seam');return`<div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Código</th><th>Produto</th><th>Categoria</th><th>Unidade</th><th>Mín.</th><th>Máx.</th><th>Status</th></tr></thead><tbody>${items.map(p=>`<tr><td class="fw-bold">${esc(p.codigo_interno||'-')}</td><td><div class="fw-bold">${esc(p.nome)}</div><div class="small text-muted2">${esc(p.descricao||'')}</div></td><td>${esc(p.categorias?.nome||'-')}</td><td>${esc(p.unidades_medida?.sigla||'-')}</td><td>${n(p.estoque_minimo)}</td><td>${p.estoque_maximo==null?'-':n(p.estoque_maximo)}</td><td>${p.ativo?'<span class="soft-badge badge-soft-success">Ativo</span>':'<span class="soft-badge badge-soft-danger">Inativo</span>'}</td></tr>`).join('')}</tbody></table></div>`}
    function produtoModal(){return`<div class="modal fade" id="produtoModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><form id="produtoForm"><div class="modal-header"><div><h5 class="fw-bold mb-0">Novo produto</h5><p class="text-muted2 small mb-0">Preencha os dados do material.</p></div><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row g-3"><div class="col-md-8"><label class="form-label">Nome<input class="form-control mt-1" name="nome" required></label></div><div class="col-md-4"><label class="form-label">Código interno<input class="form-control mt-1" name="codigo_interno"></label></div><div class="col-md-6"><label class="form-label">Categoria<select class="form-select mt-1" name="categoria_id"><option value="">Selecione</option>${options(state.categorias)}</select></label></div><div class="col-md-6"><label class="form-label">Unidade<select class="form-select mt-1" name="unidade_medida_id"><option value="">Selecione</option>${options(state.unidades,'sigla')}</select></label></div><div class="col-md-4"><label class="form-label">Estoque mínimo<input class="form-control mt-1" name="estoque_minimo" type="number" min="0" step="0.001" value="0"></label></div><div class="col-md-4"><label class="form-label">Estoque máximo<input class="form-control mt-1" name="estoque_maximo" type="number" min="0" step="0.001"></label></div><div class="col-md-4"><label class="form-label">Código de barras<input class="form-control mt-1" name="codigo_barras"></label></div><div class="col-12"><label class="form-label">Descrição<textarea class="form-control mt-1" name="descricao" rows="3"></textarea></label></div></div></div><div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Salvar</button></div></form></div></div></div>`}

    async function saveProduto(ev){ev.preventDefault();const data=Object.fromEntries(new FormData(ev.currentTarget));try{await api('/produtos',{method:'POST',body:JSON.stringify({...data,categoria_id:data.categoria_id||null,unidade_medida_id:data.unidade_medida_id||null,codigo_barras:data.codigo_barras||null,estoque_minimo:Number(data.estoque_minimo||0),estoque_maximo:data.estoque_maximo?Number(data.estoque_maximo):null,controla_validade:false,controla_lote:false})});bootstrap.Modal.getInstance(byId('produtoModal')).hide();toast('Produto cadastrado com sucesso.');await navigate('produtos')}catch(err){toast(err.message,'danger')}}

    function renderEstoque(){meta('Estoque','Movimentações e saldo por local');byId('app').innerHTML=`<div class="surface p-3 p-md-4"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3"><div><h5 class="fw-bold mb-1">Saldo de estoque</h5><p class="text-muted2 small mb-0">Consulte saldos e registre entradas, saídas e ajustes.</p></div><div class="d-flex gap-2"><div class="search-box"><i class="bi bi-search"></i><input class="form-control" id="saldoSearch" placeholder="Buscar saldo..."></div><button class="btn btn-primary" onclick="openMovimentacaoModal()"><i class="bi bi-arrow-left-right me-1"></i>Movimentar</button></div></div><div id="saldoTable">${tableSaldo(state.saldo)}</div></div>${movimentacaoModal()}`;byId('saldoSearch').addEventListener('input',e=>{const q=e.target.value.toLowerCase();byId('saldoTable').innerHTML=tableSaldo(state.saldo.filter(s=>[s.produto,s.local_estoque,s.categoria].join(' ').toLowerCase().includes(q)))});byId('movimentacaoForm').addEventListener('submit',saveMovimentacao)}
    function tableSaldo(items,compact=false){if(!items.length)return empty('Nenhum saldo encontrado','bi-boxes');return`<div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Produto</th>${compact?'':'<th>Categoria</th>'}<th>Local</th><th>Saldo</th><th>Mínimo</th><th>Status</th></tr></thead><tbody>${items.map(s=>`<tr><td><div class="fw-bold">${esc(s.produto||'-')}</div><div class="small text-muted2">${esc(s.codigo_interno||'')}</div></td>${compact?'':`<td>${esc(s.categoria||'-')}</td>`}<td>${esc(s.local_estoque||'-')}</td><td class="fw-bold">${n(s.saldo_atual)}</td><td>${n(s.estoque_minimo)}</td><td>${s.abaixo_estoque_minimo?'<span class="soft-badge badge-soft-danger">Baixo</span>':'<span class="soft-badge badge-soft-success">OK</span>'}</td></tr>`).join('')}</tbody></table></div>`}
    function movimentacaoModal(){return`<div class="modal fade" id="movimentacaoModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><form id="movimentacaoForm"><div class="modal-header"><div><h5 class="fw-bold mb-0">Nova movimentação</h5><p class="text-muted2 small mb-0">Entrada, saída ou ajuste.</p></div><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row g-3"><div class="col-md-6"><label class="form-label">Produto<select class="form-select mt-1" name="produto_id" required><option value="">Selecione</option>${options(state.produtos)}</select></label></div><div class="col-md-6"><label class="form-label">Local<select class="form-select mt-1" name="local_estoque_id" required><option value="">Selecione</option>${options(state.locais)}</select></label></div><div class="col-md-4"><label class="form-label">Tipo<select class="form-select mt-1" name="tipo" required><option value="entrada">Entrada</option><option value="saida">Saída</option><option value="ajuste_entrada">Ajuste entrada</option><option value="ajuste_saida">Ajuste saída</option></select></label></div><div class="col-md-4"><label class="form-label">Origem<select class="form-select mt-1" name="origem"><option value="manual">Manual</option><option value="compra">Compra</option><option value="solicitacao">Solicitação</option><option value="inventario">Inventário</option><option value="devolucao">Devolução</option></select></label></div><div class="col-md-4"><label class="form-label">Quantidade<input class="form-control mt-1" name="quantidade" type="number" step="0.001" min="0.001" required></label></div><div class="col-md-4"><label class="form-label">Documento<input class="form-control mt-1" name="documento"></label></div><div class="col-md-4"><label class="form-label">Lote<input class="form-control mt-1" name="lote"></label></div><div class="col-md-4"><label class="form-label">Validade<input class="form-control mt-1" name="data_validade" type="date"></label></div><div class="col-12"><label class="form-label">Observação<textarea class="form-control mt-1" name="observacao" rows="3"></textarea></label></div></div></div><div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Registrar</button></div></form></div></div></div>`}
    function openMovimentacaoModal(){bootstrap.Modal.getOrCreateInstance(byId('movimentacaoModal')).show()}
    async function saveMovimentacao(ev){ev.preventDefault();const data=Object.fromEntries(new FormData(ev.currentTarget));try{await api('/movimentacoes',{method:'POST',body:JSON.stringify({...data,quantidade:Number(data.quantidade),documento:data.documento||null,lote:data.lote||null,data_validade:data.data_validade||null,observacao:data.observacao||null})});bootstrap.Modal.getInstance(byId('movimentacaoModal')).hide();toast('Movimentação registrada.');await navigate('estoque')}catch(err){toast(err.message,'danger')}}

    function renderSolicitacoes(){meta('Solicitações','Solicitações internas e liberações por WhatsApp');byId('app').innerHTML=`<div class="surface p-3 p-md-4"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3"><div><h5 class="fw-bold mb-1">Solicitações de material</h5><p class="text-muted2 small mb-0">Ao criar, o almoxarife recebe a autorização pelo WhatsApp.</p></div><button class="btn btn-primary" onclick="openSolicitacaoModal()"><i class="bi bi-plus-lg me-1"></i>Nova solicitação</button></div>${tableSolicitacoes(state.solicitacoes)}</div>${solicitacaoModal()}${atenderModal()}`;attachSolicitacaoForms()}
    function tableSolicitacoes(items,compact=false){if(!items.length)return empty('Nenhuma solicitação encontrada','bi-clipboard2');return`<div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Data</th><th>Status</th><th>Justificativa</th>${compact?'':'<th>Solicitante</th><th>Itens</th><th>Ações</th>'}</tr></thead><tbody>${items.map(s=>`<tr><td>${d(s.data_solicitacao)}</td><td>${badge(s.status)}</td><td><div class="fw-bold">${esc(s.justificativa||'-')}</div><div class="small text-muted2">${esc(s.observacao||'')}</div></td>${compact?'':`<td>${esc(s.usuarios?.nome||'-')}</td><td>${(s.solicitacao_itens||[]).length}</td><td>${s.status==='aprovada'?`<button class="btn btn-sm btn-primary" onclick="openAtenderModal('${s.id}')"><i class="bi bi-check2-square me-1"></i>Atender</button>`:'<span class="text-muted2 small">-</span>'}</td>`}</tr>`).join('')}</tbody></table></div>`}
    function solicitacaoModal(){return`<div class="modal fade" id="solicitacaoModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content"><form id="solicitacaoForm"><div class="modal-header"><div><h5 class="fw-bold mb-0">Nova solicitação</h5><p class="text-muted2 small mb-0">A autorização será enviada ao almoxarife.</p></div><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row g-3"><div class="col-md-6"><label class="form-label">Setor<select class="form-select mt-1" name="setor_id"><option value="">Selecione</option>${options(state.setores)}</select></label></div><div class="col-md-6"><label class="form-label">Centro de custo<select class="form-select mt-1" name="centro_custo_id"><option value="">Selecione</option>${state.centrosCusto.map(c=>`<option value="${esc(c.id)}">${esc(c.codigo||'')} ${esc(c.nome||'')}</option>`).join('')}</select></label></div><div class="col-12"><label class="form-label">Justificativa<textarea class="form-control mt-1" name="justificativa" rows="3" required></textarea></label></div><div class="col-12"><div class="d-flex justify-content-between align-items-center mb-2"><h6 class="fw-bold mb-0">Itens solicitados</h6><button class="btn btn-sm btn-light" type="button" id="addItemBtn"><i class="bi bi-plus-lg me-1"></i>Adicionar item</button></div><div id="solicitacaoItens" class="vstack gap-2"></div></div></div></div><div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Enviar solicitação</button></div></form></div></div></div>`}
    function attachSolicitacaoForms(){if(byId('solicitacaoForm')){byId('solicitacaoForm').addEventListener('submit',saveSolicitacao);byId('addItemBtn').addEventListener('click',addSolicitacaoItem);addSolicitacaoItem()}if(byId('atenderForm'))byId('atenderForm').addEventListener('submit',atenderSolicitacao)}
    function addSolicitacaoItem(){const box=byId('solicitacaoItens');if(!box)return;const index=box.children.length+1;const row=document.createElement('div');row.className='row g-2 align-items-end';row.innerHTML=`<div class="col-md-7"><label class="form-label">Produto ${index}<select class="form-select mt-1 item-produto" required><option value="">Selecione</option>${options(state.produtos)}</select></label></div><div class="col-md-3"><label class="form-label">Quantidade<input class="form-control mt-1 item-quantidade" type="number" min="0.001" step="0.001" required></label></div><div class="col-md-2"><button class="btn btn-light w-100" type="button"><i class="bi bi-trash"></i></button></div>`;row.querySelector('button').addEventListener('click',()=>row.remove());box.appendChild(row)}
    function openSolicitacaoModal(){bootstrap.Modal.getOrCreateInstance(byId('solicitacaoModal')).show()}
    async function saveSolicitacao(ev){ev.preventDefault();const data=Object.fromEntries(new FormData(ev.currentTarget));const rows=[...document.querySelectorAll('#solicitacaoItens .row')];const itens=rows.map(row=>({produto_id:row.querySelector('.item-produto').value,quantidade_solicitada:Number(row.querySelector('.item-quantidade').value),observacao:null})).filter(i=>i.produto_id&&i.quantidade_solicitada>0);if(!itens.length){toast('Adicione pelo menos um item válido.','warning');return}try{await api('/solicitacoes',{method:'POST',body:JSON.stringify({solicitante_id:auth.usuario?.id||null,setor_id:data.setor_id||auth.usuario?.setor_id||null,centro_custo_id:data.centro_custo_id||auth.usuario?.centro_custo_id||null,justificativa:data.justificativa,observacao:null,itens})});bootstrap.Modal.getInstance(byId('solicitacaoModal')).hide();toast('Solicitação criada e enviada ao almoxarife.');await navigate('solicitacoes')}catch(err){toast(err.message,'danger')}}
    function atenderModal(){return`<div class="modal fade" id="atenderModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><form id="atenderForm"><div class="modal-header"><h5 class="fw-bold mb-0">Atender solicitação</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" name="solicitacao_id"><label class="form-label">Local de estoque<select class="form-select mt-1" name="local_estoque_id" required><option value="">Selecione</option>${options(state.locais)}</select></label></div><div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Confirmar</button></div></form></div></div></div>`}
    function openAtenderModal(id){byId('atenderForm').solicitacao_id.value=id;bootstrap.Modal.getOrCreateInstance(byId('atenderModal')).show()}
    async function atenderSolicitacao(ev){ev.preventDefault();const data=Object.fromEntries(new FormData(ev.currentTarget));try{await api(`/solicitacoes/${data.solicitacao_id}/atender`,{method:'POST',body:JSON.stringify({local_estoque_id:data.local_estoque_id,usuario_id:auth.usuario?.id||null})});bootstrap.Modal.getInstance(byId('atenderModal')).hide();toast('Solicitação atendida com sucesso.');await navigate('solicitacoes')}catch(err){toast(err.message,'danger')}}

    function renderCadastros(){meta('Cadastros','Setores, locais, fornecedores e centros de custo');byId('app').innerHTML=`<div class="row g-3">${cadCard('Setores','/cadastros/setores',state.setores,'bi-diagram-3')}${cadCard('Locais de estoque','/cadastros/locais-estoque',state.locais,'bi-geo-alt')}${cadCard('Fornecedores','/cadastros/fornecedores',state.fornecedores,'bi-truck')}${ccCard()}</div>`;document.querySelectorAll('[data-cad]').forEach(f=>f.addEventListener('submit',saveCad));byId('centroCustoForm').addEventListener('submit',saveCC)}
    function cadCard(title,endpoint,items,icon){return`<div class="col-lg-6"><div class="surface p-3 p-md-4 h-100"><h5 class="fw-bold mb-1"><i class="bi ${icon} me-2 text-primary"></i>${title}</h5><p class="small text-muted2">${items.length} registros</p><form data-cad data-endpoint="${endpoint}" class="d-flex gap-2 mb-3"><input class="form-control" name="nome" placeholder="Novo registro" required><button class="btn btn-primary">Salvar</button></form><div class="vstack gap-2">${items.slice(0,8).map(i=>`<div class="d-flex justify-content-between p-2 rounded-3 bg-body-tertiary"><span class="fw-semibold">${esc(i.nome)}</span><span class="soft-badge ${i.ativo===false?'badge-soft-danger':'badge-soft-success'}">${i.ativo===false?'Inativo':'Ativo'}</span></div>`).join('')||'<p class="small text-muted2 mb-0">Nenhum registro.</p>'}</div></div></div>`}
    function ccCard(){return`<div class="col-lg-6"><div class="surface p-3 p-md-4 h-100"><h5 class="fw-bold mb-1"><i class="bi bi-cash-coin me-2 text-primary"></i>Centros de custo</h5><p class="small text-muted2">${state.centrosCusto.length} registros</p><form id="centroCustoForm" class="row g-2 mb-3"><div class="col-sm-4"><input class="form-control" name="codigo" placeholder="Código" required></div><div class="col-sm-6"><input class="form-control" name="nome" placeholder="Nome" required></div><div class="col-sm-2"><button class="btn btn-primary w-100"><i class="bi bi-check-lg"></i></button></div></form><div class="vstack gap-2">${state.centrosCusto.slice(0,8).map(c=>`<div class="p-2 rounded-3 bg-body-tertiary"><span class="fw-bold">${esc(c.codigo||'-')}</span><span class="text-muted2"> — ${esc(c.nome||'')}</span></div>`).join('')||'<p class="small text-muted2 mb-0">Nenhum registro.</p>'}</div></div></div>`}
    async function saveCad(ev){ev.preventDefault();try{await api(ev.currentTarget.dataset.endpoint,{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(ev.currentTarget)))});toast('Cadastro salvo.');await navigate('cadastros')}catch(err){toast(err.message,'danger')}}

    function renderUsuarios(){meta('Usuários','Perfis e permissões do sistema');byId('app').innerHTML=`<div class="surface p-3 p-md-4"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3"><div><h5 class="fw-bold mb-1">Usuários</h5><p class="text-muted2 small mb-0">Vincule usuários já criados no Supabase Auth.</p></div><button class="btn btn-primary" onclick="openUsuarioModal()"><i class="bi bi-person-plus me-1"></i>Novo usuário</button></div>${tableUsers()}</div>${userModal()}`;byId('usuarioForm').addEventListener('submit',saveUsuario)}
    function tableUsers(){if(!state.usuarios.length)return empty('Nenhum usuário cadastrado','bi-people');return`<div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Nome</th><th>Email</th><th>Perfil</th><th>Cargo</th><th>Status</th></tr></thead><tbody>${state.usuarios.map(u=>`<tr><td class="fw-bold">${esc(u.nome||'-')}</td><td>${esc(u.email||'-')}</td><td><span class="soft-badge badge-soft-primary">${esc(u.perfil||'-')}</span></td><td>${esc(u.cargo||'-')}</td><td>${u.ativo?'<span class="soft-badge badge-soft-success">Ativo</span>':'<span class="soft-badge badge-soft-danger">Inativo</span>'}</td></tr>`).join('')}</tbody></table></div>`}
    function userModal(){return`<div class="modal fade" id="usuarioModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><form id="usuarioForm"><div class="modal-header"><div><h5 class="fw-bold mb-0">Vincular usuário</h5><p class="text-muted2 small mb-0">O usuário precisa existir no Supabase Auth.</p></div><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row g-3"><div class="col-12"><label class="form-label">ID do usuário no Auth<input class="form-control mt-1" name="id" placeholder="UUID do Supabase Auth" required></label></div><div class="col-md-6"><label class="form-label">Nome<input class="form-control mt-1" name="nome" required></label></div><div class="col-md-6"><label class="form-label">Email<input class="form-control mt-1" name="email" type="email" required></label></div><div class="col-md-4"><label class="form-label">Perfil<select class="form-select mt-1" name="perfil" required><option value="admin">Admin</option><option value="gestor">Gestor</option><option value="almoxarife">Almoxarife</option><option value="solicitante">Solicitante</option><option value="consulta">Consulta</option></select></label></div><div class="col-md-4"><label class="form-label">Cargo<input class="form-control mt-1" name="cargo"></label></div><div class="col-md-4"><label class="form-label">Telefone<input class="form-control mt-1" name="telefone"></label></div><div class="col-md-6"><label class="form-label">Setor<select class="form-select mt-1" name="setor_id"><option value="">Selecione</option>${options(state.setores)}</select></label></div><div class="col-md-6"><label class="form-label">Centro de custo<select class="form-select mt-1" name="centro_custo_id"><option value="">Selecione</option>${state.centrosCusto.map(c=>`<option value="${esc(c.id)}">${esc(c.codigo||'')} ${esc(c.nome||'')}</option>`).join('')}</select></label></div></div></div><div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Salvar</button></div></form></div></div></div>`}
    function openUsuarioModal(){bootstrap.Modal.getOrCreateInstance(byId('usuarioModal')).show()}
    async function saveUsuario(ev){ev.preventDefault();const data=Object.fromEntries(new FormData(ev.currentTarget));try{await api('/usuarios',{method:'POST',body:JSON.stringify({...data,setor_id:data.setor_id||null,centro_custo_id:data.centro_custo_id||null,ativo:true})});bootstrap.Modal.getInstance(byId('usuarioModal')).hide();toast('Usuário vinculado.');await navigate('usuarios')}catch(err){toast(err.message,'danger')}}

    function open(){const r=route();if(r==='login')return renderAuth('login');if(r==='esqueci-senha')return renderAuth('esqueci-senha');if(r==='resetar-senha')return renderAuth('resetar-senha');if(!auth.token)return renderAuth('login');renderShell();navigate(ROUTES.some(x=>x.id===r)?r:'dashboard')}
    window.addEventListener('popstate',open);window.addEventListener('hashchange',open);document.documentElement.setAttribute('data-bs-theme',localStorage.getItem('almox_theme')||'light');open();
    window.navigate=navigate;window.openProdutoModal=openProdutoModal;window.openMovimentacaoModal=openMovimentacaoModal;window.openSolicitacaoModal=openSolicitacaoModal;window.openAtenderModal=openAtenderModal;window.openUsuarioModal=openUsuarioModal;
  </script>
</body>
</html>
