<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-2: #2563eb;
      --primary-soft: #dbeafe;
      --success: #15803d;
      --success-soft: #dcfce7;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --warning: #a16207;
      --warning-soft: #fef3c7;
      --dark: #0b1220;
      --dark-2: #111827;
      --radius: 10px;
      --shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
      --sidebar: 270px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 480px;
      background:
        linear-gradient(135deg, rgba(29, 78, 216, 0.92), rgba(15, 23, 42, 0.96)),
        var(--dark);
    }

    .auth-hero {
      color: #fff;
      padding: 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 20px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      font-weight: 900;
    }

    .auth-hero-copy {
      max-width: 620px;
    }

    .auth-hero-copy h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 4vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .auth-hero-copy p {
      margin: 0;
      max-width: 560px;
      color: #dbeafe;
      font-size: 18px;
      line-height: 1.55;
    }

    .auth-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 14px;
      max-width: 620px;
    }

    .auth-metric {
      padding: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .auth-metric strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .auth-metric span {
      color: #bfdbfe;
      font-size: 13px;
    }

    .auth-panel {
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 32px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .auth-card h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .auth-card > p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.45;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar);
      position: fixed;
      inset: 0 auto 0 0;
      background: var(--dark);
      color: #fff;
      padding: 18px 14px;
      overflow-y: auto;
      z-index: 20;
    }

    .sidebar-top {
      padding: 8px 10px 18px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .sidebar-title {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
    }

    .sidebar-subtitle {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 3px;
    }

    .nav {
      display: grid;
      gap: 5px;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: #cbd5e1;
      padding: 11px 12px;
      border-radius: var(--radius);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.16s ease;
    }

    .nav button:hover,
    .nav button.active {
      background: var(--primary);
      color: #fff;
    }

    .main {
      width: calc(100% - var(--sidebar));
      margin-left: var(--sidebar);
      padding: 22px;
    }

    .mobile-header {
      display: none;
      background: var(--dark);
      color: #fff;
      padding: 12px 14px;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
      margin-bottom: 16px;
    }

    .topbar h1 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .user-area {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .user-badge {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 11px;
      color: #334155;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 14px;
    }

    .card,
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .card {
      padding: 18px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
    }

    .card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .card strong {
      display: block;
      font-size: 30px;
      line-height: 1;
    }

    .panel {
      padding: 18px;
      margin-bottom: 16px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      align-items: end;
    }

    .form-grid.cols-3 {
      grid-template-columns: repeat(3, minmax(180px, 1fr));
    }

    .form-grid.cols-2 {
      grid-template-columns: repeat(2, minmax(220px, 1fr));
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #334155;
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: var(--radius);
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
      outline: none;
      font-weight: 400;
      min-height: 42px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 82px;
    }

    .btn {
      border: 0;
      border-radius: var(--radius);
      padding: 10px 14px;
      min-height: 42px;
      background: var(--primary);
      color: #fff;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.16s ease;
    }

    .btn:hover {
      background: var(--primary-2);
    }

    .btn.secondary {
      background: #475569;
    }

    .btn.secondary:hover {
      background: #334155;
    }

    .btn.ghost {
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--line);
    }

    .btn.ghost:hover {
      background: #e2e8f0;
    }

    .btn.danger {
      background: var(--danger);
    }

    .btn.full {
      width: 100%;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: auto;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: var(--surface-2);
      color: #334155;
      font-size: 13px;
      font-weight: 900;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 900;
      background: #e2e8f0;
      color: #334155;
      white-space: nowrap;
    }

    .badge.success {
      background: var(--success-soft);
      color: var(--success);
    }

    .badge.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.warning {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .badge.info {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--muted);
      padding: 18px;
      line-height: 1.45;
    }

    .muted {
      color: var(--muted);
    }

    .message {
      display: none;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 14px;
      font-weight: 800;
      font-size: 14px;
    }

    .message.show {
      display: block;
    }

    .message.success {
      color: var(--success);
      background: var(--success-soft);
      border: 1px solid #bbf7d0;
    }

    .message.error {
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid #fecaca;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0;
    }

    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 15;
    }

    @media (max-width: 1080px) {
      .grid {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }

      .form-grid,
      .form-grid.cols-3 {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }
    }

    @media (max-width: 860px) {
      .auth-page {
        grid-template-columns: 1fr;
      }

      .auth-hero {
        min-height: auto;
        padding: 28px;
        gap: 42px;
      }

      .auth-panel {
        min-height: auto;
        padding: 28px;
      }

      .auth-metrics {
        grid-template-columns: 1fr;
      }

      .mobile-header {
        display: flex;
      }

      .app-shell {
        display: block;
      }

      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.2s ease;
        width: min(82vw, 310px);
      }

      body.menu-open .sidebar {
        transform: translateX(0);
      }

      body.menu-open .drawer-backdrop {
        display: block;
      }

      .main {
        width: 100%;
        margin-left: 0;
        padding: 14px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .user-area {
        justify-content: flex-start;
      }

      .grid,
      .grid-2,
      .form-grid,
      .form-grid.cols-2,
      .form-grid.cols-3 {
        grid-template-columns: 1fr;
      }

      .panel-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const API_URL = 'https://almoxarifado-backend-tan.vercel.app';

    const root = document.getElementById('root');

    const auth = {
      token: localStorage.getItem('almox_token'),
      usuario: JSON.parse(localStorage.getItem('almox_usuario') || 'null')
    };

    const state = {
      page: 'dashboard',
      categorias: [],
      unidades: [],
      produtos: [],
      saldo: [],
      solicitacoes: [],
      locais: [],
      fornecedores: [],
      setores: [],
      centrosCusto: [],
      usuarios: []
    };

    const pages = [
      { id: 'dashboard', label: 'Dashboard', icon: '□' },
      { id: 'produtos', label: 'Produtos', icon: '▣' },
      { id: 'estoque', label: 'Estoque', icon: '↔' },
      { id: 'solicitacoes', label: 'Solicitações', icon: '✓' },
      { id: 'cadastros', label: 'Cadastros', icon: '+' },
      { id: 'usuarios', label: 'Usuários', icon: '◉' }
    ];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('pt-BR');
    }

    function formatDate(value) {
      if (!value) return '-';
      return new Date(value).toLocaleDateString('pt-BR');
    }

    function saveSession(data) {
      auth.token = data.access_token;
      auth.usuario = data.usuario;
      localStorage.setItem('almox_token', data.access_token);
      localStorage.setItem('almox_usuario', JSON.stringify(data.usuario));
    }

    function clearSession() {
      auth.token = null;
      auth.usuario = null;
      localStorage.removeItem('almox_token');
      localStorage.removeItem('almox_usuario');
    }

    async function api(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...(options.headers || {})
      };

      if (auth.token) {
        headers.Authorization = `Bearer ${auth.token}`;
      }

      let response;

      try {
        response = await fetch(`${API_URL}${endpoint}`, {
          ...options,
          headers
        });
      } catch (error) {
        throw new Error('Não foi possível conectar ao backend. Verifique se a API está online e se o CORS está liberado.');
      }

      const contentType = response.headers.get('content-type') || '';
      const data = contentType.includes('application/json')
        ? await response.json()
        : await response.text();

      if (!response.ok) {
        const message = typeof data === 'string'
          ? data
          : data.erro || data.mensagem || 'Erro na requisição';

        if (response.status === 401 && endpoint !== '/auth/login') {
          clearSession();
          renderLogin('Sua sessão expirou. Entre novamente.');
          return;
        }

        throw new Error(message);
      }

      return data;
    }

    function showMessage(text, type = 'success') {
      const el = document.getElementById('message');
      if (!el) return;
      el.textContent = text;
      el.className = `message show ${type}`;
      setTimeout(() => {
        el.className = 'message';
      }, 5200);
    }

    function optionList(items, labelBuilder = null) {
      return items.map((item) => {
        const label = labelBuilder
          ? labelBuilder(item)
          : item.nome || item.sigla || item.codigo || item.email || item.id;
        return `<option value="${escapeHtml(item.id)}">${escapeHtml(label)}</option>`;
      }).join('');
    }

    async function loadData() {
      const requests = await Promise.allSettled([
        api('/categorias'),
        api('/produtos'),
        api('/saldo-estoque'),
        api('/solicitacoes'),
        api('/cadastros/unidades-medida'),
        api('/cadastros/locais-estoque'),
        api('/cadastros/fornecedores'),
        api('/cadastros/setores'),
        api('/cadastros/centros-custo'),
        api('/usuarios')
      ]);

      state.categorias = requests[0].status === 'fulfilled' ? requests[0].value : [];
      state.produtos = requests[1].status === 'fulfilled' ? requests[1].value : [];
      state.saldo = requests[2].status === 'fulfilled' ? requests[2].value : [];
      state.solicitacoes = requests[3].status === 'fulfilled' ? requests[3].value : [];
      state.unidades = requests[4].status === 'fulfilled' ? requests[4].value : [];
      state.locais = requests[5].status === 'fulfilled' ? requests[5].value : [];
      state.fornecedores = requests[6].status === 'fulfilled' ? requests[6].value : [];
      state.setores = requests[7].status === 'fulfilled' ? requests[7].value : [];
      state.centrosCusto = requests[8].status === 'fulfilled' ? requests[8].value : [];
      state.usuarios = requests[9].status === 'fulfilled' ? requests[9].value : [];
    }

    function renderAuthShell(content) {
      root.innerHTML = `
        <main class="auth-page">
          <section class="auth-hero">
            <div class="auth-brand">
              <div class="brand-mark">A</div>
              <div>Almoxarifado</div>
            </div>

            <div class="auth-hero-copy">
              <h1>Controle de estoque claro, rastreável e profissional.</h1>
              <p>Gerencie produtos, entradas, saídas, solicitações internas e permissões em uma interface leve e pronta para uso em empresa.</p>
            </div>

            <div class="auth-metrics">
              <div class="auth-metric"><strong>API</strong><span>Conectada ao backend publicado</span></div>
              <div class="auth-metric"><strong>Auth</strong><span>Login com Supabase</span></div>
              <div class="auth-metric"><strong>Mobile</strong><span>Layout responsivo</span></div>
            </div>
          </section>

          <section class="auth-panel">
            <div class="auth-card">${content}</div>
          </section>
        </main>
      `;
    }

    function renderLogin(errorMessage = '') {
      renderAuthShell(`
        <h2>Entrar</h2>
        <p>Informe suas credenciais para acessar o sistema.</p>

        <form id="loginForm" class="stack">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
          </label>

          <label>
            Senha
            <input name="senha" type="password" autocomplete="current-password" required />
          </label>

          <button class="btn full" type="submit">Entrar</button>

          <div class="actions" style="justify-content: space-between;">
            <a href="#/esqueci-senha">Esqueci minha senha</a>
          </div>

          <div id="loginError" class="message ${errorMessage ? 'show error' : 'error'}">${escapeHtml(errorMessage)}</div>
        </form>
      `);

      document.getElementById('loginForm').addEventListener('submit', handleLogin);
    }

    function renderForgotPassword() {
      renderAuthShell(`
        <h2>Recuperar senha</h2>
        <p>Digite seu email para solicitar a redefinição de senha.</p>

        <form id="forgotForm" class="stack">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
          </label>

          <button class="btn full" type="submit">Enviar instruções</button>
          <a href="#/login">Voltar para o login</a>
          <div id="forgotMessage" class="message"></div>
        </form>
      `);

      document.getElementById('forgotForm').addEventListener('submit', handleForgotPassword);
    }

    function renderResetPassword() {
      const tokens = getRecoveryTokensFromUrl();

      renderAuthShell(`
        <h2>Redefinir senha</h2>
        <p>Informe sua nova senha para concluir a recuperação de acesso.</p>

        <form id="resetForm" class="stack">
          <label>
            Nova senha
            <input name="senha" type="password" autocomplete="new-password" required minlength="6" />
          </label>

          <label>
            Confirmar nova senha
            <input name="confirmar_senha" type="password" autocomplete="new-password" required minlength="6" />
          </label>

          <input type="hidden" name="access_token" value="${tokens.access_token || ''}" />
          <input type="hidden" name="refresh_token" value="${tokens.refresh_token || ''}" />

          <button class="btn full" type="submit">Salvar nova senha</button>

          <a href="#/login">Voltar para o login</a>

          <div id="resetMessage" class="message"></div>
        </form>
      `);

      document.getElementById('resetForm').addEventListener('submit', handleResetPassword);
    }

    async function handleLogin(event) {
      event.preventDefault();
      const errorEl = document.getElementById('loginError');
      const data = Object.fromEntries(new FormData(event.target));

      try {
        errorEl.className = 'message error';
        const result = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify(data)
        });
        saveSession(result);
        location.hash = '#/dashboard';
        renderApp();
        navigate('dashboard');
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.className = 'message show error';
      }
    }

    async function handleForgotPassword(event) {
      event.preventDefault();
      const message = document.getElementById('forgotMessage');
      const data = Object.fromEntries(new FormData(event.target));

      try {
        await api('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify(data)
        });
        message.textContent = 'Se o email estiver cadastrado, as instruções serão enviadas.';
        message.className = 'message show success';
      } catch (error) {
        message.textContent = 'O frontend está pronto, mas o backend precisa da rota POST /auth/forgot-password para concluir este fluxo.';
        message.className = 'message show error';
      }
    }

    async function handleResetPassword(event) {
      event.preventDefault();

      const message = document.getElementById('resetMessage');
      const data = Object.fromEntries(new FormData(event.target));

      if (data.senha !== data.confirmar_senha) {
        message.textContent = 'As senhas não conferem.';
        message.className = 'message show error';
        return;
      }

      if (!data.access_token || !data.refresh_token) {
        message.textContent = 'Link de recuperação inválido ou expirado. Solicite uma nova recuperação de senha.';
        message.className = 'message show error';
        return;
      }

      try {
        await api('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({
            access_token: data.access_token,
            refresh_token: data.refresh_token,
            senha: data.senha
          })
        });

        message.textContent = 'Senha redefinida com sucesso. Você já pode fazer login.';
        message.className = 'message show success';

        setTimeout(() => {
          window.location.href = window.location.pathname + '#/login';
        }, 1800);
      } catch (error) {
        message.textContent = error.message;
        message.className = 'message show error';
      }
    }

        </div>
      `);

      document.getElementById('usuarioForm').addEventListener('submit', saveUsuario);
    }

    function tableUsuarios() {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Perfil</th>
                <th>Setor</th>
                <th>Centro de custo</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${state.usuarios.map((usuario) => `
                <tr>
                  <td>${escapeHtml(usuario.nome)}</td>
                  <td>${escapeHtml(usuario.email)}</td>
                  <td>${escapeHtml(usuario.perfil)}</td>
                  <td>${escapeHtml(usuario.setores?.nome || '-')}</td>
                  <td>${escapeHtml(usuario.centros_custo?.nome || '-')}</td>
                  <td>${usuario.ativo ? '<span class="badge success">Ativo</span>' : '<span class="badge danger">Inativo</span>'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function saveUsuario(event) {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.target));

      const payload = {
        ...data,
        setor_id: data.setor_id || null,
        centro_custo_id: data.centro_custo_id || null,
        cargo: data.cargo || null,
        telefone: data.telefone || null,
        ativo: true
      };

      try {
        await api('/usuarios', { method: 'POST', body: JSON.stringify(payload) });
        showMessage('Usuário salvo com sucesso.');
        await navigate('usuarios');
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    function isResetPasswordUrl() {
      const query = new URLSearchParams(window.location.search);
      const hash = window.location.hash || '';

      return (
        query.get('resetar_senha') === 'true' ||
        hash.includes('type=recovery') ||
        hash.includes('/resetar-senha')
      );
    }

    function getRecoveryTokensFromUrl() {
      const hash = window.location.hash.startsWith('#')
        ? window.location.hash.substring(1)
        : window.location.hash;

      const params = new URLSearchParams(hash);

      return {
        access_token: params.get('access_token'),
        refresh_token: params.get('refresh_token'),
        type: params.get('type')
      };
    }
    
    function boot() {
      const route = location.hash.replace('#/', '') || 'dashboard';

      if (isResetPasswordUrl()) {
        renderResetPassword();
        return;
      }

      if (route === 'esqueci-senha') {
        renderForgotPassword();
        return;
      }

      if (route === 'login') {
        renderLogin();
        return;
      }

      if (!auth.token) {
        renderLogin();
        return;
      }

      renderApp();
      navigate(pages.some((page) => page.id === route) ? route : 'dashboard');
    }

    window.addEventListener('hashchange', boot);
    boot();
  </script>
</body>
</html>
