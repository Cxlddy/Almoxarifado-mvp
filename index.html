<!DOCTYPE html>

<head>

  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://almoxarifado-backend-tan.vercel.app" crossorigin>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --sidebar:280px;
      --bg:#f6f7f9;
      --surface:#ffffff;
      --border:#d9dee7;
      --text:#172033;
      --muted:#64748b;
      --primary:#1f5fbf;
      --shadow:0 8px 22px rgba(23,32,51,.07);
      --radius:14px;
    }
    [data-bs-theme="dark"]{
      --bg:#101624;
      --surface:#151d2c;
      --border:#2b3548;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --shadow:0 8px 22px rgba(0,0,0,.24);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:"Nunito Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      line-height:1.56;
      min-height:100vh;
      overflow-x:hidden;
    }
    .auth-page{
      min-height:100vh;
      display:grid;
      grid-template-columns:1.05fr .95fr;
      background:#f6f7f9;
    }
    .auth-hero{
      color:var(--text);
      padding:clamp(2rem,6vw,5rem);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .auth-hero h1{
      font-size:clamp(2rem,4vw,4rem);
      font-weight:800;
      letter-spacing:0;
      line-height:1.12;
      max-width:720px;
    }
    .auth-hero p{max-width:620px;color:var(--muted);font-size:1.08rem;line-height:1.6}
    .proof-list{
      display:grid;
      gap:.85rem;
      max-width:640px;
      margin-top:2rem;
    }
    .proof-item{
      display:flex;
      gap:.75rem;
      align-items:flex-start;
      padding:.9rem 0;
      border-top:1px solid var(--border);
      color:var(--text);
    }
    .proof-item i{color:var(--primary);font-size:1.1rem;margin-top:.1rem}
    .proof-item strong{display:block;font-weight:800}
    .proof-item span{display:block;color:var(--muted);font-size:.95rem;line-height:1.55}
    .auth-box{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:clamp(1rem,3vw,2.5rem);
      background:#eef1f5;
    }
    .auth-card{
      width:min(100%,455px);
      padding:clamp(1.4rem,4vw,2.4rem);
      border-radius:var(--radius);
      background:#ffffff;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }
    [data-bs-theme="dark"] .auth-page{background:var(--bg)}
    [data-bs-theme="dark"] .auth-box{background:#0f1725}
    [data-bs-theme="dark"] .auth-card{background:var(--surface)}

    .app{display:flex;min-height:100vh}
    .sidebar{
      position:fixed;
      inset:0 auto 0 0;
      width:var(--sidebar);
      background:rgba(15,23,42,.97);
      color:#fff;
      padding:1rem;
      z-index:1040;
      box-shadow:12px 0 45px rgba(15,23,42,.16);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:.8rem;
      padding:.8rem .7rem 1.1rem;
      border-bottom:1px solid rgba(255,255,255,.09);
      margin-bottom:1rem;
    }
    .brand-icon{
      width:44px;height:44px;display:grid;place-items:center;border-radius:12px;
      background:var(--primary);
      color:#fff;
    }
    .brand strong{display:block;line-height:1}
    .brand small{color:rgba(255,255,255,.58)}
    .nav-label{
      margin:1rem .8rem .45rem;
      color:rgba(255,255,255,.42);
      font-size:.72rem;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .side-link{
      display:flex;align-items:center;gap:.8rem;
      padding:.82rem .9rem;
      color:rgba(255,255,255,.72);
      border-radius:16px;
      margin-bottom:.25rem;
      font-weight:720;
      text-decoration:none;
      transition:.16s ease;
    }
    .side-link:hover,.side-link.active{background:var(--primary);color:#fff}
    .side-link i{width:1.2rem;text-align:center}
    .main{
      margin-left:var(--sidebar);
      width:calc(100% - var(--sidebar));
      padding:1.25rem;
      min-width:0;
    }
    .topbar{
      position:sticky;
      top:1rem;
      z-index:1020;
      padding:1rem;
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      margin-bottom:1.25rem;
    }
    .surface{
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .page-title{font-size:clamp(1.35rem,2.5vw,2rem);font-weight:800;letter-spacing:0;margin:0}
    .page-sub{color:var(--muted);font-size:.92rem;margin:.15rem 0 0}
    .btn{border-radius:14px;font-weight:760;min-height:2.65rem}
    .btn-primary{background:var(--primary);border-color:var(--primary);box-shadow:none}
    .btn-primary:hover,.btn-primary:focus{background:#184f9f;border-color:#184f9f}
    .btn-icon{width:2.65rem;display:inline-grid;place-items:center;padding:0}
    .form-control,.form-select{border-radius:14px;min-height:2.75rem;border-color:rgba(100,116,139,.25)}
    .form-control:focus,.form-select:focus{box-shadow:0 0 0 .22rem rgba(37,99,235,.13);border-color:rgba(37,99,235,.45)}
    .stat{
      position:relative;overflow:hidden;
      padding:1.2rem;min-height:132px;
    }
    .stat small{display:block;color:var(--muted);font-weight:760}
    .stat strong{font-size:2rem;letter-spacing:-.05em}
    .stat .icon{
      width:48px;height:48px;display:grid;place-items:center;border-radius:16px;
      background:#e8f0ff;color:var(--primary);font-size:1.3rem;
    }
    .soft{border-radius:999px;padding:.38rem .65rem;font-weight:760;font-size:.76rem;display:inline-flex;gap:.35rem;align-items:center}
    .soft-primary{background:rgba(37,99,235,.12);color:#1d4ed8}
    .soft-success{background:rgba(22,163,74,.12);color:#15803d}
    .soft-danger{background:rgba(220,38,38,.12);color:#b91c1c}
    .soft-warning{background:rgba(245,158,11,.16);color:#b45309}
    .soft-secondary{background:rgba(100,116,139,.14);color:#475569}
    [data-bs-theme="dark"] .soft-secondary{color:#cbd5e1}
    .table{--bs-table-bg:transparent;vertical-align:middle}
    .table thead th{
      color:var(--muted);
      font-size:.73rem;
      text-transform:uppercase;
      letter-spacing:.06em;
      background:rgba(148,163,184,.08);
      border-bottom:1px solid var(--border);
    }
    .table td{border-color:var(--border);padding-top:.88rem;padding-bottom:.88rem}
    .table-hover tbody tr:hover{background:rgba(37,99,235,.045)}
    .search{position:relative}
    .search i{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--muted)}
    .search input{padding-left:2.55rem}
    .empty{text-align:center;color:var(--muted);padding:3rem 1rem}
    .empty i{font-size:2.6rem;color:rgba(37,99,235,.38);display:block;margin-bottom:.65rem}
    .skeleton{
      border-radius:var(--radius);
      min-height:130px;
      background:#e8edf5;
    }
    .modal{z-index:3000!important}
    .modal-backdrop{z-index:2990!important}
    .modal-content,.offcanvas{border-radius:22px;border:1px solid var(--border)}
    .mobile-menu-btn{display:none}

    @media(max-width:991.98px){
      .sidebar{display:none}
      .main{margin-left:0;width:100%;padding:.8rem}
      .mobile-menu-btn{display:inline-grid}
      .topbar{top:.65rem;border-radius:18px}
      .stat{min-height:118px}
    }
    @media(max-width:575.98px){
      .auth-page{grid-template-columns:1fr}
      .auth-hero{min-height:auto;padding:2rem 1.1rem .5rem}
      .auth-hero .small{display:none}
      .auth-box{min-height:auto;padding:1rem}
      .topbar{padding:.85rem}
      .surface{border-radius:18px}
      .stat strong{font-size:1.6rem}
      .table-responsive{border-radius:16px}
    }
    @media(prefers-reduced-motion:reduce){
      *{animation-duration:.001ms!important;transition-duration:.001ms!important}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toastArea" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:2000"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = 'https://almoxarifado-backend-tan.vercel.app';
    const CACHE_TTL = 45_000;

    const pages = [
      ['dashboard','Dashboard','bi-speedometer2','VisÃ£o geral do almoxarifado'],
      ['produtos','Produtos','bi-box-seam','Cadastro e consulta de materiais'],
      ['estoque','Estoque','bi-boxes','MovimentaÃ§Ãµes e saldo por local'],
      ['solicitacoes','SolicitaÃ§Ãµes','bi-clipboard2-check','SolicitaÃ§Ãµes internas e autorizaÃ§Ãµes'],
      ['devolucoes','DevoluÃ§Ãµes','bi-arrow-counterclockwise','DevoluÃ§Ã£o de itens emprestados'],
      ['cadastros','Cadastros','bi-folder2-open','Setores, locais, fornecedores e centros de custo'],
      ['usuarios','UsuÃ¡rios','bi-people','Perfis e permissÃµes do sistema']
    ];

    const root = document.getElementById('root');
    const cache = new Map();
    const state = { page:'dashboard' };

    function safeJson(value, fallback=null){
      try{ return JSON.parse(value || 'null') ?? fallback; }
      catch{ return fallback; }
    }

    const auth = {
      token: sessionStorage.getItem('almox_token'),
      refreshToken: sessionStorage.getItem('almox_refresh_token'),
      usuario: safeJson(sessionStorage.getItem('almox_usuario'))
    };

    const $ = (id) => document.getElementById(id);

    function isAdmin(){
      return auth.usuario?.perfil === 'admin';
    }

    function visiblePages(){
      return pages.filter(([id]) => isAdmin() || id !== 'usuarios');
    }

    const esc = (v) => String(v ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      .replaceAll('"','&quot;').replaceAll("'",'&#039;');

    const fmt = (v) => Number(v || 0).toLocaleString('pt-BR', { maximumFractionDigits: 3 });
    const dateBR = (v) => v ? new Date(v).toLocaleDateString('pt-BR') : '-';

    function debounce(fn, wait=220){
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }

    function saveSession(data){
      auth.token = data.access_token;
      auth.refreshToken = data.refresh_token;
      auth.usuario = data.usuario;
      sessionStorage.setItem('almox_token', data.access_token);
      sessionStorage.setItem('almox_refresh_token', data.refresh_token || '');
      sessionStorage.setItem('almox_usuario', JSON.stringify(data.usuario));
    }

    function clearSession(){
      auth.token = null;
      auth.refreshToken = null;
      auth.usuario = null;
      cache.clear();
      sessionStorage.removeItem('almox_token');
      sessionStorage.removeItem('almox_refresh_token');
      sessionStorage.removeItem('almox_usuario');
    }

    async function api(endpoint, options={}){
      const headers = { 'Content-Type':'application/json', ...(options.headers || {}) };
      if(auth.token) headers.Authorization = `Bearer ${auth.token}`;

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 18_000);

      try{
        const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers, signal: controller.signal });
        const type = response.headers.get('content-type') || '';
        const payload = type.includes('application/json') ? await response.json() : await response.text();

        if(!response.ok){
          const msg = typeof payload === 'string' ? payload : payload.erro || payload.mensagem || 'Erro na requisiÃ§Ã£o';
          if(response.status === 401 || response.status === 403){
            clearSession();
            renderAuth('login', msg);
          }
          throw new Error(msg);
        }
        return payload;
      }catch(err){
        if(err.name === 'AbortError') throw new Error('Tempo de resposta excedido. Tente novamente.');
        throw err;
      }finally{
        clearTimeout(timeout);
      }
    }

    async function get(endpoint, key, { fresh=false } = {}){
      const now = Date.now();
      const current = cache.get(key);
      if(!fresh && current && (now - current.time) < CACHE_TTL) return current.data;

      const data = await api(endpoint);
      cache.set(key, { data: Array.isArray(data) ? data : [], time: now });
      return cache.get(key).data;
    }

    function invalidate(...keys){ keys.forEach(k => cache.delete(k)); }

    async function load(keys, fresh=false){
      const map = {
        categorias: ['/categorias','categorias'],
        produtos: ['/produtos','produtos'],
        saldo: ['/saldo-estoque','saldo'],
        solicitacoes: ['/solicitacoes','solicitacoes'],
        unidades: ['/cadastros/unidades-medida','unidades'],
        locais: ['/cadastros/locais-estoque','locais'],
        fornecedores: ['/cadastros/fornecedores','fornecedores'],
        setores: ['/cadastros/setores','setores'],
        centros: ['/cadastros/centros-custo','centros'],
        usuarios: ['/usuarios','usuarios'],
        admins: ['/usuarios/admins','admins']
      };
      const results = await Promise.all(keys.map(k => get(map[k][0], map[k][1], { fresh })));
      return Object.fromEntries(keys.map((k,i) => [k, results[i]]));
    }

    function toast(message, type='success'){
      const id = `t${Date.now()}`;
      const cls = type === 'success' ? 'text-bg-success' : type === 'warning' ? 'text-bg-warning' : 'text-bg-danger';
      $('toastArea').insertAdjacentHTML('beforeend', `
        <div id="${id}" class="toast ${cls} border-0 shadow" role="alert">
          <div class="d-flex">
            <div class="toast-body">${esc(message)}</div>
            <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      `);
      const el = $(id);
      const t = new bootstrap.Toast(el, { delay: 3800 });
      t.show();
      el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    function routeFromUrl(){
      const search = new URLSearchParams(location.search);
      if(search.get('resetar_senha') === 'true') return 'resetar-senha';
      if(location.hash.includes('type=recovery')) return 'resetar-senha';
      return location.hash.replace('#/','').split('?')[0] || (auth.token ? 'dashboard' : 'login');
    }

    function recoveryTokens(){
      const hash = location.hash.startsWith('#') ? location.hash.slice(1) : location.hash;
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get('access_token'),
        refresh_token: params.get('refresh_token')
      };
    }

    function renderAuth(mode='login', error=''){
      const forgot = mode === 'esqueci-senha';
      const reset = mode === 'resetar-senha';
      root.innerHTML = `
        <main class="auth-page">
          <section class="auth-hero">
            <div>
              <div class="d-flex align-items-center gap-2 mb-4">
                <div class="brand-icon"><i class="bi bi-box-seam"></i></div>
                <strong class="fs-5">Almoxarifado</strong>
              </div>
              <h1>Um sistema simples para controlar materiais da empresa.</h1>
              <p class="mt-4">Cadastre produtos, acompanhe o estoque, registre saÃ­das e peÃ§a autorizaÃ§Ã£o quando alguÃ©m precisar retirar um item.</p>
              <div class="proof-list">
                <div class="proof-item">
                  <i class="bi bi-check2-circle"></i>
                  <div>
                    <strong>Fluxo de solicitaÃ§Ã£o real</strong>
                    <span>O usuÃ¡rio escolhe um admin, informa os itens e a aprovaÃ§Ã£o Ã© enviada por WhatsApp.</span>
                  </div>
                </div>
                <div class="proof-item">
                  <i class="bi bi-boxes"></i>
                  <div>
                    <strong>Estoque com movimentaÃ§Ã£o registrada</strong>
                    <span>Entradas, saÃ­das, atendimentos e devoluÃ§Ãµes ficam vinculados aos produtos e locais de estoque.</span>
                  </div>
                </div>
                <div class="proof-item">
                  <i class="bi bi-person-check"></i>
                  <div>
                    <strong>Perfis separados</strong>
                    <span>Admin gerencia cadastros e usuÃ¡rios. UsuÃ¡rio comum faz solicitaÃ§Ãµes e acompanha o que pediu.</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="small text-secondary"></div>
          </section>
          <section class="auth-box">
            <div class="auth-card">
              <span class="soft soft-primary mb-3"><i class="bi bi-building-lock"></i>Acesso interno</span>
              <h2 class="fw-bold">${forgot ? 'Recuperar senha' : reset ? 'Nova senha' : 'Entrar no sistema'}</h2>
              <p class="text-secondary">${forgot ? 'Digite seu email para receber o link de recuperaÃ§Ã£o.' : reset ? 'Escolha uma nova senha para continuar usando o sistema.' : 'Entre com o email e a senha cadastrados pelo admin.'}</p>
              ${forgot ? forgotForm(error) : reset ? resetForm(error) : loginForm(error)}
            </div>
          </section>
        </main>`;
      if(forgot) $('forgotForm').addEventListener('submit', handleForgot);
      else if(reset) $('resetForm').addEventListener('submit', handleReset);
      else $('loginForm').addEventListener('submit', handleLogin);
    }

    function loginForm(error){
      return `<form id="loginForm" class="vstack gap-3">
        <label class="form-label">Email<input class="form-control mt-1" name="email" type="email" autocomplete="email" required></label>
        <label class="form-label">Senha<input class="form-control mt-1" name="senha" type="password" autocomplete="current-password" required></label>
        ${error ? `<div class="alert alert-danger mb-0">${esc(error)}</div>` : ''}
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Entrar</button>
        <a class="text-center small fw-semibold" href="#/esqueci-senha">Esqueci minha senha</a>
      </form>`;
    }

    function forgotForm(error){
      return `<form id="forgotForm" class="vstack gap-3">
        <label class="form-label">Email<input class="form-control mt-1" name="email" type="email" autocomplete="email" required></label>
        ${error ? `<div class="alert alert-danger mb-0">${esc(error)}</div>` : ''}
        <div id="forgotMessage"></div>
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-envelope-arrow-up me-2"></i>Enviar instruÃ§Ãµes</button>
        <a class="text-center small fw-semibold" href="#/login">Voltar ao login</a>
      </form>`;
    }

    function resetForm(error){
      const t = recoveryTokens();
      return `<form id="resetForm" class="vstack gap-3">
        <label class="form-label">Nova senha<input class="form-control mt-1" name="senha" type="password" minlength="6" required></label>
        <label class="form-label">Confirmar senha<input class="form-control mt-1" name="confirmar_senha" type="password" minlength="6" required></label>
        <input type="hidden" name="access_token" value="${esc(t.access_token || '')}">
        <input type="hidden" name="refresh_token" value="${esc(t.refresh_token || '')}">
        ${error ? `<div class="alert alert-danger mb-0">${esc(error)}</div>` : ''}
        <div id="resetMessage"></div>
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-key me-2"></i>Salvar nova senha</button>
        <a class="text-center small fw-semibold" href="#/login">Voltar ao login</a>
      </form>`;
    }

    async function handleLogin(e){
      e.preventDefault();
      const form = e.currentTarget;
      const btn = form.querySelector('button');
      const data = Object.fromEntries(new FormData(form));
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';
      try{
        const res = await fetch(`${API_URL}/auth/login`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(data)
        });
        const body = await res.json();
        if(!res.ok) throw new Error(body.erro || body.mensagem || 'Erro ao fazer login');
        saveSession(body);
        location.hash = '#/dashboard';
        renderShell();
        await navigate('dashboard', true);
      }catch(err){
        renderAuth('login', err.message);
      }
    }

    async function handleForgot(e){
      e.preventDefault();
      const box = $('forgotMessage');
      try{
        await api('/auth/forgot-password', { method:'POST', body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget))) });
        box.innerHTML = '<div class="alert alert-success mb-0">Se o email estiver cadastrado, as instruÃ§Ãµes serÃ£o enviadas.</div>';
      }catch(err){
        box.innerHTML = `<div class="alert alert-danger mb-0">${esc(err.message)}</div>`;
      }
    }

    async function handleReset(e){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.currentTarget));
      const box = $('resetMessage');
      if(data.senha !== data.confirmar_senha){
        box.innerHTML = '<div class="alert alert-danger mb-0">As senhas nÃ£o conferem.</div>';

    async function saveSol(e){
      e.preventDefault();

      if(!data.admin_id){ toast('Selecione o admin responsÃ¡vel pela autorizaÃ§Ã£o.', 'warning'); return; }
      try{
        await api('/solicitacoes',{method:'POST',body:JSON.stringify({admin_id:data.admin_id,setor_id:data.setor_id||null,centro_custo_id:data.centro_custo_id||null,justificativa:data.justificativa,observacao:null,itens})});

        hideModal('solModal');
        toast('SolicitaÃ§Ã£o criada e enviada ao admin selecionado.');
        await navigate('solicitacoes', true);
      }catch(err){toast(err.message,'danger')}

    function openAtender(id){
      const form = $('atenderForm');
      if(!form){
        toast('FormulÃ¡rio de atendimento nÃ£o encontrado. Atualize a pÃ¡gina e tente novamente.', 'danger');
        return;
      }

      form.reset();

      const inputSolicitacao = form.querySelector('[name="solicitacao_id"]');
      if(!inputSolicitacao){
        toast('Campo da solicitaÃ§Ã£o nÃ£o encontrado.', 'danger');

    async function atenderSol(e){
      e.preventDefault();

      const form = e.currentTarget;
      const data = Object.fromEntries(new FormData(form));

      if(!data.solicitacao_id){
        toast('SolicitaÃ§Ã£o nÃ£o identificada para atendimento.', 'danger');
        return;
      }

      if(!data.local_estoque_id){
        toast('Selecione o local de estoque para atender a solicitaÃ§Ã£o.', 'warning');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"], .btn-primary');
      const originalText = submitBtn ? submitBtn.innerHTML : '';

      if(submitBtn){
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Atendendo...';
      }

      try{
        await api(`/solicitacoes/${data.solicitacao_id}/atender`, {
          method:'POST',
          body:JSON.stringify({
            local_estoque_id:data.local_estoque_id,
            usuario_id:auth.usuario?.id||null
          })
        });

        invalidate('solicitacoes','saldo');
        hideModal('atenderModal');
        toast('SolicitaÃ§Ã£o atendida com sucesso.');
        await navigate('solicitacoes', true);
        cleanupBootstrapArtifacts();
      }catch(err){
        toast(err.message,'danger');
      }finally{
        if(submitBtn){
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      }
    }

    function abrirDevolucao(btn) {
      const form = $('devolucaoForm');
      const pendente = Number(btn.dataset.pendente || 0);

      if(!form){
        toast('FormulÃ¡rio de devoluÃ§Ã£o nÃ£o encontrado. Atualize a pÃ¡gina e tente novamente.', 'danger');
        return;
      }

      const inputItem = form.querySelector('[name="solicitacao_item_id"]');
      const inputQuantidade = form.querySelector('[name="quantidade"]');
      const inputPendente = form.querySelector('[name="pendente"]');

      form.reset();
      inputItem.value = btn.dataset.id;
      inputQuantidade.value = pendente;
      inputQuantidade.max = pendente;
      inputPendente.value = fmt(pendente);

      $('devolucaoResumo').textContent =
        `Produto: ${btn.dataset.produto}. Quantidade mÃ¡xima para devoluÃ§Ã£o: ${fmt(pendente)}.`;

      showModal('devolucaoModal');

      const payload = {

        local_estoque_id: data.local_estoque_id,
        solicitado_por_id: auth.usuario?.id || null,
        quantidade: Number(data.quantidade),
        observacao: data.observacao || null

      try {
        await api('/devolucoes/solicitar', {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        hideModal('devolucaoModal');
        toast('SolicitaÃ§Ã£o de devoluÃ§Ã£o enviada ao admin.');
        await navigate('devolucoes', true);

    async function saveUser(e){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.currentTarget));
      try{
        await api('/usuarios',{method:'POST',body:JSON.stringify({...data,setor_id:data.setor_id||null,centro_custo_id:data.centro_custo_id||null,ativo:true})});

        hideModal('userModal');

    function cleanupBootstrapArtifacts(){
      document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
      document.body.classList.remove('modal-open');
      document.body.style.removeProperty('overflow');
      document.body.style.removeProperty('padding-right');
      document.body.removeAttribute('data-bs-overflow');
      document.body.removeAttribute('data-bs-padding-right');
    }

    function moveModalToBody(id){
      const el = $(id);
      if(!el) return null;

      if(el.parentElement !== document.body){
        document.body.appendChild(el);
      }

      return el;
    }

    function showModal(id){
      cleanupBootstrapArtifacts();

      const el = moveModalToBody(id);
      if(!el){
        toast('Janela nÃ£o encontrada. Atualize a pÃ¡gina e tente novamente.', 'danger');
        return;
      }

      bootstrap.Modal.getOrCreateInstance(el, {
        backdrop: true,
        keyboard: true,
        focus: true
      }).show();
    }

    function hideModal(id){
      const el = $(id);
      if(!el){
        cleanupBootstrapArtifacts();
        return;
      }
      const m = bootstrap.Modal.getInstance(el) || bootstrap.Modal.getOrCreateInstance(el);
      if(m) m.hide();
      setTimeout(cleanupBootstrapArtifacts, 180);
    }

    document.addEventListener('hidden.bs.modal', () => {
      setTimeout(cleanupBootstrapArtifacts, 80);
    });

    function boot(){
      document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('almox_theme') || 'light');
      const route = routeFromUrl();
      if(['login','esqueci-senha','resetar-senha'].includes(route)) return renderAuth(route);
      if(!auth.token) return renderAuth('login');
      renderShell();
      navigate(visiblePages().some(p=>p[0]===route) ? route : 'dashboard');
    }

    window.addEventListener('hashchange', boot);
    window.addEventListener('popstate', boot);
    window.navigate = navigate;
    window.showModal = showModal;
    window.openAtender = openAtender;

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
