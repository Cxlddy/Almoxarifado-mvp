    :root{
      color-scheme:light;
      --sidebar:288px;
      --bg:#f2f2f7;
      --surface:#ffffff;
      --surface-strong:#f9f9fb;
      --surface-secondary:#f2f2f7;
      --border:#d1d1d6;
      --border-strong:#c7c7cc;
      --text:#1c1c1e;
      --muted:#8e8e93;
      --primary:#007aff;
      --primary-strong:#0a84ff;
      --accent:#007aff;
      --danger:#ff3b30;
      --success:#34c759;
      --warning:#ff9500;
      --shadow:0 1px 2px rgba(60,60,67,.12),0 14px 34px rgba(60,60,67,.12);
      --shadow-soft:0 1px 2px rgba(60,60,67,.10);
      --radius:18px;
      --radius-sm:12px;
      --radius-lg:24px;
      --ease-ios:cubic-bezier(.2,.8,.2,1);
      --ease-spring:cubic-bezier(.175,.885,.32,1.275);
      --bs-body-bg:#f2f2f7;
      --bs-body-color:#1c1c1e;
      --bs-secondary-color:#8e8e93;
      --bs-tertiary-bg:#f2f2f7;

      --bs-link-color:#007aff;
      --bs-link-hover-color:#0a84ff;
      --font-sf:"San Francisco","SF Pro Text","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI Variable","Segoe UI","Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html{background:var(--bg);color-scheme:light}
    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font-sf);
      font-size:15px;
      line-height:1.55;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      transition:background-color .28s var(--ease-ios), color .28s var(--ease-ios);
    }
    body,
    button,
    input,
    optgroup,
    select,
    textarea,
    .btn,
    .form-control,
    .form-select,
    .dropdown-menu,
    .modal,
    .offcanvas,
    .table,
    .toast{
      font-family:var(--font-sf)!important;
    }
    a{color:var(--primary);text-decoration:none}
    a:hover{text-decoration:none;color:var(--primary-strong)}

    .auth-page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(1rem,4vw,3rem);
      background:var(--bg);
    }
    .auth-box{
      width:min(100%,440px);
      display:grid;
      gap:1rem;
    }
    .auth-card{
      width:100%;
      padding:clamp(1.35rem,4vw,2.1rem);
      border-radius:var(--radius-lg);
      background:var(--surface);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .app{display:flex;min-height:100vh;background:var(--bg)}
    .sidebar{
      position:fixed;
      inset:0 auto 0 0;
      width:var(--sidebar);
      background:var(--surface);
      color:var(--text);
      padding:1rem .85rem;
      z-index:1040;
      border-right:1px solid var(--border);
      box-shadow:var(--shadow-soft);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:.8rem;
      padding:.75rem .7rem 1rem;
      border-bottom:1px solid var(--border);
      margin-bottom:1rem;
    }
    .brand-icon{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      border-radius:13px;
      background:var(--primary);
      color:#fff;
      box-shadow:none;
      border:0;
    }
    .brand strong{
      display:block;
      line-height:1;
      font-weight:700;
      letter-spacing:-.01em;
      color:var(--text);
      text-transform:none;
    }
    .brand small{color:var(--muted)}
    .nav-label{
      margin:1rem .75rem .45rem;
      color:var(--muted);
      font-size:.72rem;
      font-weight:700;
      letter-spacing:.02em;
      text-transform:uppercase;
    }
    .side-link{
      display:flex;
      align-items:center;
      gap:.75rem;
      padding:.72rem .8rem;
      color:var(--text);
      border-radius:var(--radius-sm);
      margin-bottom:.25rem;
      font-weight:600;
      text-decoration:none;
      border:1px solid transparent;
      transition:background-color .16s ease,color .16s ease,border-color .16s ease;
    }
    .side-link:hover{
      background:var(--surface-secondary);
      color:var(--text);
      border-color:var(--border);
    }
    .side-link.active{
      background:rgba(10,132,255,.18);
      color:var(--primary);
      border-color:rgba(10,132,255,.28);
      box-shadow:none;
    }
    .side-link i{width:1.2rem;text-align:center;font-size:1rem}

    .main{
      margin-left:var(--sidebar);
      width:calc(100% - var(--sidebar));
      padding:1rem 1.15rem 1.35rem;
      min-width:0;
    }
    .topbar{
      position:sticky;
      top:.75rem;
      z-index:1020;
      padding:.85rem 1rem;
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      margin-bottom:1rem;
    }
    .surface{
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }
    .page-title{
      font-size:clamp(1.25rem,2vw,1.7rem);
      font-weight:700;
      letter-spacing:-.025em;
      margin:0;
      color:var(--text);
      text-transform:none;
    }
    .page-sub{color:var(--muted);font-size:.92rem;margin:.08rem 0 0}

    .btn{
      border-radius:999px;
      font-weight:600;
      min-height:2.55rem;
      padding:.45rem 1rem;
      border-width:1px;
      transition:background-color .16s ease,color .16s ease,border-color .16s ease,opacity .16s ease;
    }
    .btn:hover{opacity:.96}
    .btn-light{
      background:var(--surface-secondary);
      border-color:var(--border);
      color:var(--text);
    }
    .btn-light:hover,.btn-light:focus{
      background:var(--border);
      border-color:var(--border-strong);
      color:var(--text);
    }
    .btn-primary{
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
      box-shadow:none;
    }
    .btn-primary:hover,.btn-primary:focus{
      background:var(--primary-strong);
      border-color:var(--primary-strong);
      color:#fff;
    }
    .btn-icon{
      width:2.55rem;
      display:inline-grid;
      place-items:center;
      padding:0;
    }
    .user-badge{
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:var(--primary);
      color:#fff;
      border:0;
      font-weight:700;
    }

    .form-label{font-weight:600;color:var(--text);margin-bottom:.4rem}
    .form-control,.form-select{
      border-radius:var(--radius-sm);
      min-height:2.7rem;
      border-color:var(--border);
      background:var(--surface-strong);
      color:var(--text);
      box-shadow:none;
    }
    .form-control::placeholder{color:var(--muted)}
    .form-control:focus,.form-select:focus{
      box-shadow:0 0 0 .22rem rgba(10,132,255,.24);
      border-color:var(--primary);
      background:var(--surface-strong);
      color:var(--text);
    }
    .phone-field{
      display:flex;
      align-items:stretch;
      margin-top:.25rem;
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      background:var(--surface-strong);
      overflow:hidden;
      transition:border-color .16s ease, box-shadow .16s ease;
    }
    .phone-field:focus-within{
      border-color:var(--primary);
      box-shadow:0 0 0 .22rem rgba(10,132,255,.24);
    }
    .phone-prefix{
      display:inline-flex;
      align-items:center;
      gap:.35rem;
      min-height:2.7rem;
      padding:0 .8rem;
      background:var(--surface-secondary);
      border-right:1px solid var(--border);
      color:var(--text);
      font-weight:700;
      font-size:.9rem;
      white-space:nowrap;
    }
    .phone-field .form-control{
      border:0;
      border-radius:0;
      margin:0!important;
      box-shadow:none!important;
      background:transparent;
    }
    .phone-help{
      display:block;
      margin-top:.38rem;
      color:var(--muted);
      font-size:.76rem;
      font-weight:500;
    }

    .stat{
      position:relative;
      overflow:hidden;
      padding:1.05rem;
      min-height:122px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:var(--surface);
      box-shadow:var(--shadow-soft);
    }
    .stat small{
      display:block;
      color:var(--muted);
      font-weight:600;
      letter-spacing:0;
      text-transform:none;
      font-size:.82rem;
    }
    .stat strong{font-size:1.85rem;letter-spacing:-.03em;color:var(--text)}
    .stat .icon{
      width:44px;
      height:44px;
      display:grid;
      place-items:center;
      border-radius:13px;
      background:rgba(10,132,255,.18);
      color:var(--primary);
      font-size:1.18rem;
      border:0;
    }

    .soft{
      border-radius:999px;
      padding:.33rem .62rem;
      font-weight:600;
      font-size:.74rem;
      display:inline-flex;
      gap:.35rem;
      align-items:center;
      border:0;
      text-transform:none;
      letter-spacing:0;
    }
    .soft-primary{background:rgba(10,132,255,.18);color:var(--primary)}
    .soft-success{background:rgba(48,209,88,.18);color:var(--success)}
    .soft-danger{background:rgba(255,69,58,.18);color:var(--danger)}
    .soft-warning{background:rgba(255,159,10,.2);color:var(--warning)}
    .soft-secondary{background:var(--surface-secondary);color:var(--muted)}

    .table{
      --bs-table-bg:transparent;
      vertical-align:middle;
      color:var(--text);
      margin-bottom:0;
    }
    .table thead th{
      color:var(--muted);
      font-size:.74rem;
      text-transform:none;
      letter-spacing:0;
      background:var(--surface-secondary);
      border-bottom:1px solid var(--border);
      font-weight:700;
    }
    .table td{
      border-color:var(--border);
      padding-top:.78rem;
      padding-bottom:.78rem;
    }
    .table-hover tbody tr:hover{background:var(--surface-secondary)}
    .table-responsive{border-radius:var(--radius-sm)}

    .search{position:relative}
    .search i{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--muted)}
    .search input{padding-left:2.55rem}
    .record-row{
      display:flex;
      justify-content:space-between;
      gap:.75rem;
      padding:.7rem .8rem;
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      background:var(--surface-strong);
    }
    .empty{text-align:center;color:var(--muted);padding:3rem 1rem}
    .empty i{font-size:2.35rem;color:var(--primary);display:block;margin-bottom:.65rem;opacity:.55}
    .skeleton{
      border-radius:var(--radius);
      min-height:130px;
      background:var(--surface-secondary);
    }

    .dropdown-menu{
      border-radius:var(--radius-sm);
      border-color:var(--border);
      box-shadow:var(--shadow);
      background:var(--surface);
      color:var(--text);
    }
    .dropdown-item,.dropdown-item-text{color:var(--text)}
    .dropdown-item:hover,.dropdown-item:focus{background:var(--surface-secondary);color:var(--text)}
    .dropdown-header{color:var(--muted)}
    .alert{border-radius:var(--radius-sm);border-width:1px}
    .modal{z-index:3000!important}
    .modal-backdrop{z-index:2990!important}
    .modal-content,.offcanvas{
      border-radius:var(--radius-lg);
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      box-shadow:var(--shadow);
    }
    .modal-header,.modal-footer{border-color:var(--border)}
    .mobile-menu-btn{display:none}


    .auth-card,.surface,.topbar,.stat,.modal-content,.offcanvas,.dropdown-menu,.toast{
      transition:background-color .28s var(--ease-ios),border-color .28s var(--ease-ios),box-shadow .28s var(--ease-ios),transform .22s var(--ease-ios),color .28s var(--ease-ios);
    }
    .btn,.side-link,.dropdown-item,.form-control,.form-select,.phone-field,.user-badge,.brand-icon,.stat .icon{
      transition:background-color .22s var(--ease-ios),border-color .22s var(--ease-ios),color .22s var(--ease-ios),box-shadow .22s var(--ease-ios),transform .18s var(--ease-ios),opacity .18s var(--ease-ios);
    }
    .app,.auth-page{animation:iosFadeIn .32s var(--ease-ios) both}
    .topbar{animation:iosSlideDown .36s var(--ease-ios) both}
    .surface{animation:iosCardIn .38s var(--ease-ios) both}
    .stat{animation:iosCardIn .42s var(--ease-spring) both}
    .stat:hover{transform:translateY(-2px)}
    .stat:active,.surface:active{transform:scale(.995)}
    .btn:active,.side-link:active,.dropdown-item:active{transform:scale(.97)}
    .brand-icon i,.stat .icon i,.empty i{animation:iosSymbolPop .42s var(--ease-spring) both}
    .side-link i{
      width:28px;
      height:28px;
      display:inline-grid;
      place-items:center;
      border-radius:9px;
      background:rgba(120,120,128,.18);
      color:var(--muted);
      font-size:1rem;
      flex:0 0 28px;
    }
    .side-link:hover i,.side-link.active i{
      background:var(--primary);
      color:#fff;
      box-shadow:0 8px 18px rgba(10,132,255,.24);
    }
    .btn-icon i,.mobile-menu-btn i{
      font-size:1.08rem;
      line-height:1;
    }
    .modal.show .modal-dialog{animation:iosModalIn .28s var(--ease-spring) both}
    .offcanvas.showing,.offcanvas.show{animation:iosSlideIn .28s var(--ease-ios) both}
    @keyframes iosFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes iosSlideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes iosSlideIn{from{opacity:.6;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
    @keyframes iosCardIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes iosModalIn{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes iosSymbolPop{0%{opacity:0;transform:scale(.72)}70%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}

  <div id="root"></div>
  <div id="toastArea" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:2000"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = window.ALMOX_API_URL || document.querySelector('meta[name="api-url"]')?.content || 'https://almoxarifado-backend-tan.vercel.app';
    const CACHE_TTL = 45_000;

    const pages = [
      ['dashboard','Dashboard','bi-speedometer2','Visão geral da operação'],
      ['produtos','Produtos','bi-box-seam','Catálogo de materiais'],
      ['estoque','Estoque','bi-boxes','Saldo por local'],
      ['solicitacoes','Solicitações','bi-clipboard2-check','Pedidos e empréstimos'],
      ['devolucoes','Devoluções','bi-arrow-counterclockwise','Retorno de materiais'],
      ['movimentacoes','Movimentações','bi-clock-history','Histórico operacional'],
      ['relatorios','Relatórios','bi-bar-chart','Indicadores e exportações'],
      ['setores-page','Setores','bi-diagram-3','Áreas solicitantes'],
      ['locais-page','Locais','bi-geo-alt','Locais de estoque'],
      ['centros-page','Centros de custo','bi-cash-coin','Controles financeiros'],
      ['unidades-page','Unidades','bi-rulers','Unidades de medida'],
      ['fornecedores','Fornecedores','bi-truck','Fornecedores cadastrados'],
      ['categorias-page','Categorias','bi-tags','Classificação dos materiais'],
      ['usuarios','Usuários','bi-people','Acessos e permissões'],
      ['perfil','Perfil','bi-person-vcard','Dados do usuário logado']
    ];

    const root = document.getElementById('root');
    const cache = new Map();
    const state = { page:'dashboard' };

    function safeJson(value, fallback=null){
      try{ return JSON.parse(value || 'null') ?? fallback; }
      catch{ return fallback; }
    }

    const auth = {
      token: sessionStorage.getItem('almox_token'),
      refreshToken: sessionStorage.getItem('almox_refresh_token'),
      usuario: safeJson(sessionStorage.getItem('almox_usuario'))
    };

    const $ = (id) => document.getElementById(id);

    function isAdmin(){
      return auth.usuario?.perfil === 'admin';
    }

    function visiblePages(){
      const adminOnly = ['usuarios', 'fornecedores', 'setores-page', 'locais-page', 'centros-page', 'unidades-page', 'categorias-page'];
      return pages.filter(([id]) => isAdmin() ? true : !adminOnly.includes(id));
    }

    const esc = (v) => String(v ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      .replaceAll('"','&quot;').replaceAll("'",'&#039;');

    const fmt = (v) => Number(v || 0).toLocaleString('pt-BR', { maximumFractionDigits: 3 });
    const dateBR = (v) => v ? new Date(v).toLocaleDateString('pt-BR') : '-';

    function phoneDigits(value){
      let digits = String(value || '').replace(/\D/g, '');
      if(digits.startsWith('55') && digits.length > 11) digits = digits.slice(2);
      return digits.slice(0, 11);
    }

    function formatPhone(value){
      const digits = phoneDigits(value);
      const ddd = digits.slice(0, 2);
      const first = digits.length > 10 ? digits.slice(2, 7) : digits.slice(2, 6);
      const second = digits.length > 10 ? digits.slice(7, 11) : digits.slice(6, 10);

      if(digits.length <= 2) return ddd ? `(${ddd}` : '';
      if(!second) return `(${ddd}) ${first}`;
      return `(${ddd}) ${first}-${second}`;
    }

    function normalizePhone(value){
      const digits = phoneDigits(value);
      return digits ? `55${digits}` : '';
    }

    function bindPhoneFields(scope=document){
      scope.querySelectorAll('[data-phone]').forEach(input => {
        input.value = formatPhone(input.value);
        input.addEventListener('input', () => {
          input.value = formatPhone(input.value);
        });
        input.addEventListener('blur', () => {
          input.value = formatPhone(input.value);
        });
      });
    }

    function phoneIsValid(value){
      return phoneDigits(value).length >= 10;
    }

    function debounce(fn, wait=220){
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }



    function setConnectionStatus(status='online', label='Operacional'){
      const el = $('connectionStatus');
      if(!el) return;
      el.className = 'system-status ' + (status === 'offline' ? 'is-offline' : status === 'loading' ? 'is-loading' : 'is-online');
      el.innerHTML = '<span></span>' + esc(label);
    }

    function saveSession(data){
      auth.token = data.access_token;
      auth.refreshToken = data.refresh_token;
      auth.usuario = data.usuario;
      sessionStorage.setItem('almox_token', data.access_token);
      sessionStorage.setItem('almox_refresh_token', data.refresh_token || '');
      sessionStorage.setItem('almox_usuario', JSON.stringify(data.usuario));
    }

    function clearSession(){
      auth.token = null;
      auth.refreshToken = null;
      auth.usuario = null;
      cache.clear();
      sessionStorage.removeItem('almox_token');
      sessionStorage.removeItem('almox_refresh_token');
      sessionStorage.removeItem('almox_usuario');
    }

    async function api(endpoint, options={}){
      const headers = { 'Content-Type':'application/json', ...(options.headers || {}) };
      if(auth.token) headers.Authorization = `Bearer ${auth.token}`;

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 18_000);

      try{
        setConnectionStatus('loading', 'Sincronizando');
        const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers, signal: controller.signal });
        const type = response.headers.get('content-type') || '';
        const payload = type.includes('application/json') ? await response.json() : await response.text();

        if(!response.ok){
          setConnectionStatus('online', 'Operacional');
          const msg = typeof payload === 'string' ? payload : payload.erro || payload.mensagem || 'Erro na requisição';
          if(response.status === 401 || response.status === 403){
            clearSession();
            renderAuth('login', msg);
          }
          throw new Error(msg);
        }
        setConnectionStatus('online', 'Operacional');
        return payload;
      }catch(err){
        if(err.name === 'AbortError'){
          setConnectionStatus('offline', 'Tempo excedido');
          throw new Error('Tempo de resposta excedido. Tente novamente.');
        }
        if(err instanceof TypeError){
          setConnectionStatus('offline', 'Sem conexão');
        }
        throw err;
      }finally{
        clearTimeout(timeout);
      }
    }

    async function get(endpoint, key, { fresh=false } = {}){
      const now = Date.now();
      const current = cache.get(key);
      if(!fresh && current && (now - current.time) < CACHE_TTL) return current.data;

      const data = await api(endpoint);
      cache.set(key, { data: Array.isArray(data) ? data : [], time: now });
      return cache.get(key).data;
    }

    function invalidate(...keys){ keys.forEach(k => cache.delete(k)); }

    async function load(keys, fresh=false){
      const map = {
        categorias: ['/categorias','categorias'],
        produtos: ['/produtos','produtos'],
        saldo: ['/saldo-estoque','saldo'],
        movimentacoes: ['/movimentacoes','movimentacoes'],
        solicitacoes: ['/solicitacoes','solicitacoes'],
        unidades: ['/cadastros/unidades-medida','unidades'],
        locais: ['/cadastros/locais-estoque','locais'],
        fornecedores: ['/cadastros/fornecedores','fornecedores'],
        setores: ['/cadastros/setores','setores'],
        centros: ['/cadastros/centros-custo','centros'],
        usuarios: ['/usuarios','usuarios'],
        admins: ['/usuarios/admins','admins']
      };
      const results = await Promise.all(keys.map(k => get(map[k][0], map[k][1], { fresh })));
      return Object.fromEntries(keys.map((k,i) => [k, results[i]]));
    }

    function toast(message, type='success'){
      const id = `t${Date.now()}`;
      const cls = type === 'success' ? 'text-bg-success' : type === 'warning' ? 'text-bg-warning' : 'text-bg-danger';
      $('toastArea').insertAdjacentHTML('beforeend', `
        <div id="${id}" class="toast ${cls} border-0 shadow" role="alert">
          <div class="d-flex">
            <div class="toast-body">${esc(message)}</div>
            <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      `);
      const el = $(id);
      const t = new bootstrap.Toast(el, { delay: 3800 });
      t.show();
      el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    function routeFromUrl(){
      const search = new URLSearchParams(location.search);
      if(search.get('resetar_senha') === 'true') return 'resetar-senha';
      if(location.hash.includes('type=recovery')) return 'resetar-senha';
      return location.hash.replace('#/','').split('?')[0] || (auth.token ? 'dashboard' : 'login');
    }

    function recoveryTokens(){
      const hash = location.hash.startsWith('#') ? location.hash.slice(1) : location.hash;
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get('access_token'),
        refresh_token: params.get('refresh_token')
      };
    }

    function renderAuth(mode='login', error=''){
      const forgot = mode === 'esqueci-senha';
      const reset = mode === 'resetar-senha';
      root.innerHTML = `
        <main class="auth-page">
          <section class="auth-box">
            <div class="auth-card">
              ${forgot ? forgotForm(error) : reset ? resetForm(error) : loginForm(error)}
            </div>
          </section>
        </main>`;
      if(forgot) $('forgotForm').addEventListener('submit', handleForgot);
      else if(reset) $('resetForm').addEventListener('submit', handleReset);
      else $('loginForm').addEventListener('submit', handleLogin);
      bindPhoneFields(root);
    }

      return `<form id="loginForm" class="vstack gap-3">

          <span class="phone-field">
            <span class="phone-prefix">BR +55</span>
            <input class="form-control" name="identificador" type="tel" inputmode="numeric" autocomplete="tel-national" placeholder="(11) 99999-9999" maxlength="15" data-phone required>

    function resetForm(error){
      const t = recoveryTokens();
      return `<form id="resetForm" class="vstack gap-3">

        <label class="form-label">Confirmar senha<input class="form-control mt-1" name="confirmar_senha" type="password" minlength="6" required></label>
        <input type="hidden" name="access_token" value="${esc(t.access_token || '')}">
        <input type="hidden" name="refresh_token" value="${esc(t.refresh_token || '')}">
        ${error ? `<div class="alert alert-danger mb-0">${esc(error)}</div>` : ''}

        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-key me-2"></i>Salvar nova senha</button>
        <a class="text-center small fw-semibold" href="#/login">Voltar ao login</a>
      </form>`;

    async function handleLogin(e){
      e.preventDefault();
      const form = e.currentTarget;
      const btn = form.querySelector('button');
      const data = Object.fromEntries(new FormData(form));

      if(!phoneIsValid(data.identificador)){
        renderAuth('login', 'Informe um telefone válido.');
        return;
      }

      data.identificador = normalizePhone(data.identificador);

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';
      try{
        const res = await fetch(`${API_URL}/auth/login`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(data)
        });
        const body = await res.json();
        if(!res.ok) throw new Error(body.erro || body.mensagem || 'Erro ao fazer login');
        saveSession(body);
        location.hash = '#/dashboard';
        renderShell();
        await navigate('dashboard', true);
      }catch(err){
        renderAuth('login', err.message);
      }
    }

    async function handleForgot(e){
      e.preventDefault();
      const box = $('forgotMessage');
      try{
        await api('/auth/forgot-password', { method:'POST', body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget))) });
        box.innerHTML = '<div class="alert alert-success mb-0">Se o email estiver cadastrado, as instruções serão enviadas.</div>';
      }catch(err){
        box.innerHTML = `<div class="alert alert-danger mb-0">${esc(err.message)}</div>`;
      }
    }

    async function handleReset(e){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.currentTarget));
      const box = $('resetMessage');
      if(data.senha !== data.confirmar_senha){
        box.innerHTML = '<div class="alert alert-danger mb-0">As senhas não conferem.</div>';
        return;
      }
      if(!data.access_token || !data.refresh_token){
        box.innerHTML = '<div class="alert alert-danger mb-0">Link inválido ou expirado.</div>';
        return;
      }
      try{
        await api('/auth/reset-password', { method:'POST', body:JSON.stringify({access_token:data.access_token, refresh_token:data.refresh_token, senha:data.senha}) });
        box.innerHTML = '<div class="alert alert-success mb-0">Senha alterada com sucesso. Faça login novamente.</div>';
        clearSession();
        setTimeout(() => { location.hash = '#/login'; renderAuth('login'); }, 1400);
      }catch(err){
        box.innerHTML = `<div class="alert alert-danger mb-0">${esc(err.message)}</div>`;
      }
    }

    async function navigate(page, fresh=false){
      cleanupBootstrapArtifacts();
      removeStaleModals();

      const allowed = visiblePages().map(([id]) => id);

      if(!allowed.includes(page)){
        page = 'dashboard';
        history.replaceState(null, '', '#/dashboard');

    function badge(status){
      const m = {
        rascunho:['secondary','Rascunho'], enviada:['warning','Enviada'], aprovada:['success','Aprovada'],
        recusada:['danger','Recusada'], atendida_parcial:['warning','Atendida parcial'], atendida:['success','Atendida'], cancelada:['secondary','Cancelada']
      };
      const [t,l] = m[status] || ['secondary', status || '-'];
      return `<span class="soft soft-${t}">${esc(l)}</span>`;
    }

    function csvCell(value){
      return `"${String(value ?? '').replaceAll('"', '""')}"`;
    }

    function exportCsv(filename, rows){
      if(!rows.length){ toast('Não há dados para exportar.', 'warning'); return; }
      const csv = rows.map(row => row.map(csvCell).join(';')).join('\n');
      const blob = new Blob([`\ufeff${csv}`], { type:'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function saveProduto(e){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.currentTarget));
      const unidadeSigla = String(data.unidade_sigla || '').trim().toUpperCase();
      let unidades = cache.get('unidades')?.data || [];
      let unidade = unidadeSigla ? unidades.find(u => String(u.sigla || '').toUpperCase() === unidadeSigla) : null;

      if(unidadeSigla && !unidade){
        unidade = await api('/cadastros/unidades-medida', {
          method:'POST',
          body:JSON.stringify({ nome:unidadeSigla, sigla:unidadeSigla, ativo:true })
        });
        invalidate('unidades');
      }

      const payload = {...data, categoria_id:data.categoria_id||null, unidade_medida_id:unidade?.id||null, codigo_barras:data.codigo_barras||null, estoque_minimo:Number(data.estoque_minimo||0), estoque_maximo:data.estoque_maximo?Number(data.estoque_maximo):null, controla_validade:false, controla_lote:false};
      const produtoId = payload.id;
      delete payload.id;
      delete payload.unidade_sigla;
      try{
        await api(produtoId ? `/produtos/${produtoId}` : '/produtos',{method:produtoId ? 'PATCH' : 'POST',body:JSON.stringify(payload)});
        invalidate('produtos','saldo');
        await hideModal('produtoModal');
        toast(produtoId ? 'Produto atualizado com sucesso.' : 'Produto cadastrado com sucesso.');
        await navigate('produtos', true);

    }

    function openAtender(id){
      const form = $('atenderForm');
      if(!form){
        toast('Formulário de atendimento não encontrado. Atualize a página e tente novamente.', 'danger');
        return;
      }

      form.reset();

      const inputSolicitacao = form.querySelector('[name="solicitacao_id"]');
      if(!inputSolicitacao){
        toast('Campo da solicitação não encontrado.', 'danger');
        return;
      }

    async function atenderSol(e){
      e.preventDefault();

      const form = e.currentTarget;
      const data = Object.fromEntries(new FormData(form));

      if(!data.solicitacao_id){
        toast('Solicitação não identificada para atendimento.', 'danger');
        return;
      }

      if(!data.local_estoque_id){
        toast('Selecione o local de estoque para atender a solicitação.', 'warning');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"], .btn-primary');
      const originalText = submitBtn ? submitBtn.innerHTML : '';

      if(submitBtn){
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Atendendo...';
      }

      try{
        await api(`/solicitacoes/${data.solicitacao_id}/atender`, {
          method:'POST',
          body:JSON.stringify({
            local_estoque_id:data.local_estoque_id,
            usuario_id:auth.usuario?.id||null
          })
        });

        invalidate('solicitacoes','saldo');
        await hideModal('atenderModal');
        toast('Solicitação atendida com sucesso.');
        await navigate('solicitacoes', true);
        cleanupBootstrapArtifacts();
      }catch(err){
        toast(err.message,'danger');
      }finally{
        if(submitBtn){
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      }
    }

    function exportRelatorioGeral(){
      const saldo = state.saldoData?.saldo || [];

      const produtos = state.relatorioData?.produtos || [];
      const solicitacoes = state.relatorioData?.solicitacoes || [];

      const estoqueBaixo = saldo.filter(item=>item.abaixo_estoque_minimo).length;
      const entradas = movimentacoes.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+Number(m.quantidade||0),0);
      const saidas = movimentacoes.filter(m=>m.tipo==='saida').reduce((s,m)=>s+Number(m.quantidade||0),0);
      const porCategoria = saldo.reduce((acc,item)=>{ const k=item.categoria||'Sem categoria'; acc[k]=(acc[k]||0)+Number(item.saldo_atual||0); return acc; },{});
      const rows = [
        ['Relatório geral do almoxarifado'],
        ['Gerado em', new Date().toLocaleString('pt-BR')],
        [],
        ['Resumo'],
        ['Produtos cadastrados', produtos.length],
        ['Saldo total', totalSaldo],
        ['Itens com estoque baixo', estoqueBaixo],
        ['Solicitações', solicitacoes.length],

        ['Saidas', saidas],
        ['Movimentações', movimentacoes.length],
        [],
        ['Saldo por categoria'],
        ['Categoria','Saldo']
      ];
      Object.entries(porCategoria).forEach(([categoria,valor]) => rows.push([categoria, valor]));
      rows.push([], ['Últimas movimentações'], ['Data','Produto','Código','Local','Origem','Tipo','Quantidade','Responsável']);

    function openCadastroModal(pageId, id=''){
      const context = state.cadastroAtual?.pageId === pageId ? state.cadastroAtual : null;
      const config = context?.config || cadastroConfigs[pageId];
      const item = id ? context?.items.find(x => String(x.id) === String(id)) : null;
      const form = $('cadastroForm');
      if(!form || !config) return;

      form.reset();
      form.elements.id.value = item?.id || '';
      form.elements.pageId.value = pageId;
      $('cadastroModalTitle').textContent = item ? `Editar ${config.title}` : `Novo ${config.title}`;
      $('cadastroSubmit').textContent = item ? 'Salvar alteracoes' : 'Salvar';

      config.fields.forEach(field => {
        const input = form.elements[field.name];
        if(input) input.value = field.phone ? formatPhone(item?.[field.name] || '') : (item?.[field.name] || '');
      });
      form.elements.ativo.checked = item ? item.ativo !== false : true;
      showModal('cadastroModal');
    }

    async function saveCadastroItem(e){
      e.preventDefault();
      const form = e.currentTarget;
      const pageId = form.elements.pageId.value;
      const config = cadastroConfigs[pageId];
      const id = form.elements.id.value;
      const data = Object.fromEntries(new FormData(form));
      delete data.id;
      delete data.pageId;
      data.ativo = form.elements.ativo.checked;

      config.fields.forEach(field => {
        if(field.phone && data[field.name]) data[field.name] = normalizePhone(data[field.name]);
        if(field.maxlength && data[field.name]) data[field.name] = String(data[field.name]).toUpperCase().slice(0, field.maxlength);
      });

      try{
        await api(id ? `${config.endpoint}/${id}` : config.endpoint, { method: id ? 'PATCH' : 'POST', body: JSON.stringify(data) });
        invalidate(config.key);
        await hideModal('cadastroModal');
        toast(id ? 'Cadastro atualizado.' : 'Cadastro criado.');
        await navigate(pageId, true);
      }catch(err){ toast(err.message, 'danger'); }
    }

          </label></div>
          <div class="col-md-6"><label class="form-label">Setor<select class="form-select mt-1" name="setor_id"><option value="">Selecione</option>${options(d.setores)}</select></label></div>
          <div class="col-md-6"><label class="form-label">Centro<select class="form-select mt-1" name="centro_custo_id"><option value="">Selecione</option>${d.centros.map(c=>`<option value="${esc(c.id)}">${esc(c.codigo||'')} ${esc(c.nome||'')}</option>`).join('')}</select></label></div>
        </div></div>
        <div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary">Salvar</button></div>
      </form></div></div></div>`;
    }

    async function saveUser(e){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.currentTarget));

      if(!phoneIsValid(data.telefone)){
        toast('Informe um telefone válido para o usuário.', 'warning');
        return;
      }

      data.telefone = normalizePhone(data.telefone);

      try{
        await api('/usuarios',{method:'POST',body:JSON.stringify({...data,setor_id:data.setor_id||null,centro_custo_id:data.centro_custo_id||null,ativo:true})});
        invalidate('usuarios');
        await hideModal('userModal');
        toast('Usuário criado.');
        await navigate('usuarios', true);
      }catch(err){toast(err.message,'danger')}
    }

    function cleanupBootstrapArtifacts(){
      document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
      document.body.classList.remove('modal-open');
      document.body.style.removeProperty('overflow');
      document.body.style.removeProperty('padding-right');
      document.body.removeAttribute('data-bs-overflow');
      document.body.removeAttribute('data-bs-padding-right');
    }

    function removeStaleModals(){
      document.querySelectorAll('body > .modal').forEach(el => {
        bootstrap.Modal.getInstance(el)?.dispose();
        el.remove();
      });
    }

    function moveModalToBody(id){
      const el = $(id);
      if(!el) return null;

      if(el.parentElement !== document.body){
        document.body.appendChild(el);
      }

      return el;
    }

    function showModal(id){
      cleanupBootstrapArtifacts();

      const el = moveModalToBody(id);
      if(!el){
        toast('Janela não encontrada. Atualize a página e tente novamente.', 'danger');
        return;
      }

      bootstrap.Modal.getOrCreateInstance(el, {
        backdrop: true,
        keyboard: true,
        focus: true
      }).show();
    }

    function hideModal(id){
      const el = $(id);
      if(!el){
        cleanupBootstrapArtifacts();
        return Promise.resolve();
      }

      return new Promise((resolve) => {
        let resolved = false;
        const finish = () => {
          if(resolved) return;
          resolved = true;
          el.removeEventListener('hidden.bs.modal', finish);
          cleanupBootstrapArtifacts();
          resolve();
        };

        el.addEventListener('hidden.bs.modal', finish, { once:true });
        const m = bootstrap.Modal.getInstance(el) || bootstrap.Modal.getOrCreateInstance(el);

        if(m) m.hide();
        else finish();

        setTimeout(finish, 260);
      });
    }

    document.addEventListener('hidden.bs.modal', () => {
      setTimeout(cleanupBootstrapArtifacts, 80);
    });

    function boot(){
      const route = routeFromUrl();
      if(['login','esqueci-senha','resetar-senha'].includes(route)) return renderAuth(route);
      if(!auth.token) return renderAuth('login');
      renderShell();
      navigate(visiblePages().some(p=>p[0]===route) ? route : 'dashboard');
    }

    window.addEventListener('hashchange', boot);
    window.addEventListener('popstate', boot);
    window.navigate = navigate;
    window.showModal = showModal;
    window.openAtender = openAtender;
    window.openProduto = openProduto;
    window.toggleProduto = toggleProduto;
    window.exportProdutos = exportProdutos;
    window.exportSaldo = exportSaldo;
    window.exportSolicitações = exportSolicitações;
    window.exportDevolucoes = exportDevolucoes;
    window.exportMovimentações = exportMovimentações;
    window.exportRelatorioGeral = exportRelatorioGeral;

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
