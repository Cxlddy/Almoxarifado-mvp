      --surface-strong:#2c2c2e;

      --border:#38383a;

<body>
  <div id="root"></div>
  <div id="toastArea" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:2000"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = 'https://almoxarifado-backend-tan.vercel.app';
    const CACHE_TTL = 45_000;

    const pages = [
      ['dashboard','Dashboard','bi-speedometer2','Visão geral do almoxarifado'],
      ['produtos','Produtos','bi-box-seam','Cadastro e consulta de materiais'],
      ['estoque','Estoque','bi-boxes','Movimentações e saldo por local'],
      ['solicitacoes','Solicitações','bi-clipboard2-check','Solicitações internas e autorizações'],
      ['devolucoes','Devoluções','bi-arrow-counterclockwise','Devolução de itens emprestados'],
      ['cadastros','Cadastros','bi-folder2-open','Setores, locais, fornecedores e centros de custo'],
      ['usuarios','Usuários','bi-people','Perfis e permissões do sistema']
    ];

    const root = document.getElementById('root');
    const cache = new Map();
    const state = { page:'dashboard' };

    function safeJson(value, fallback=null){
      try{ return JSON.parse(value || 'null') ?? fallback; }
      catch{ return fallback; }
    }

    const auth = {
      token: sessionStorage.getItem('almox_token'),
      refreshToken: sessionStorage.getItem('almox_refresh_token'),
      usuario: safeJson(sessionStorage.getItem('almox_usuario'))
    };

    const $ = (id) => document.getElementById(id);

    function isAdmin(){
      return auth.usuario?.perfil === 'admin';
    }

    function visiblePages(){
      return pages.filter(([id]) => isAdmin() || id !== 'usuarios');
    }

    const esc = (v) => String(v ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      .replaceAll('"','&quot;').replaceAll("'",'&#039;');

    const fmt = (v) => Number(v || 0).toLocaleString('pt-BR', { maximumFractionDigits: 3 });
    const dateBR = (v) => v ? new Date(v).toLocaleDateString('pt-BR') : '-';

    function phoneDigits(value){
      let digits = String(value || '').replace(/\D/g, '');
      if(digits.startsWith('55') && digits.length > 11) digits = digits.slice(2);
      return digits.slice(0, 11);
    }

    function formatPhone(value){
      const digits = phoneDigits(value);
      const ddd = digits.slice(0, 2);
      const first = digits.length > 10 ? digits.slice(2, 7) : digits.slice(2, 6);
      const second = digits.length > 10 ? digits.slice(7, 11) : digits.slice(6, 10);

      if(digits.length <= 2) return ddd ? `(${ddd}` : '';
      if(!second) return `(${ddd}) ${first}`;
      return `(${ddd}) ${first}-${second}`;
    }

    function normalizePhone(value){
      const digits = phoneDigits(value);
      return digits ? `55${digits}` : '';
    }

    function bindPhoneFields(scope=document){
      scope.querySelectorAll('[data-phone]').forEach(input => {
        input.value = formatPhone(input.value);
        input.addEventListener('input', () => {
          input.value = formatPhone(input.value);
        });
        input.addEventListener('blur', () => {
          input.value = formatPhone(input.value);
        });
      });
    }

    function phoneIsValid(value){
      return phoneDigits(value).length >= 10;
    }

    function debounce(fn, wait=220){
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }

    function saveSession(data){
      auth.token = data.access_token;
      auth.refreshToken = data.refresh_token;
      auth.usuario = data.usuario;
      sessionStorage.setItem('almox_token', data.access_token);
      sessionStorage.setItem('almox_refresh_token', data.refresh_token || '');
      sessionStorage.setItem('almox_usuario', JSON.stringify(data.usuario));
    }

    function clearSession(){
      auth.token = null;
      auth.refreshToken = null;
      auth.usuario = null;
      cache.clear();
      sessionStorage.removeItem('almox_token');
      sessionStorage.removeItem('almox_refresh_token');
      sessionStorage.removeItem('almox_usuario');
    }

    async function api(endpoint, options={}){
      const headers = { 'Content-Type':'application/json', ...(options.headers || {}) };
      if(auth.token) headers.Authorization = `Bearer ${auth.token}`;

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 18_000);

      try{
        const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers, signal: controller.signal });
        const type = response.headers.get('content-type') || '';
        const payload = type.includes('application/json') ? await response.json() : await response.text();

        if(!response.ok){
          const msg = typeof payload === 'string' ? payload : payload.erro || payload.mensagem || 'Erro na requisição';
          if(response.status === 401 || response.status === 403){
            clearSession();
            renderAuth('login', msg);
          }
          throw new Error(msg);
        }
        return payload;
      }catch(err){
        if(err.name === 'AbortError') throw new Error('Tempo de resposta excedido. Tente novamente.');
        throw err;
      }finally{
        clearTimeout(timeout);
      }
    }

    async function get(endpoint, key, { fresh=false } = {}){
      const now = Date.now();
      const current = cache.get(key);
      if(!fresh && current && (now - current.time) < CACHE_TTL) return current.data;

      const data = await api(endpoint);
      cache.set(key, { data: Array.isArray(data) ? data : [], time: now });
      return cache.get(key).data;
    }

    function invalidate(...keys){ keys.forEach(k => cache.delete(k)); }

    async function load(keys, fresh=false){
      const map = {
        categorias: ['/categorias','categorias'],
        produtos: ['/produtos','produtos'],
        saldo: ['/saldo-estoque','saldo'],
        solicitacoes: ['/solicitacoes','solicitacoes'],
        unidades: ['/cadastros/unidades-medida','unidades'],
        locais: ['/cadastros/locais-estoque','locais'],
        fornecedores: ['/cadastros/fornecedores','fornecedores'],
        setores: ['/cadastros/setores','setores'],
        centros: ['/cadastros/centros-custo','centros'],
        usuarios: ['/usuarios','usuarios'],
        admins: ['/usuarios/admins','admins']
      };
      const results = await Promise.all(keys.map(k => get(map[k][0], map[k][1], { fresh })));
      return Object.fromEntries(keys.map((k,i) => [k, results[i]]));
    }

    function toast(message, type='success'){
      const id = `t${Date.now()}`;
      const cls = type === 'success' ? 'text-bg-success' : type === 'warning' ? 'text-bg-warning' : 'text-bg-danger';
      $('toastArea').insertAdjacentHTML('beforeend', `
        <div id="${id}" class="toast ${cls} border-0 shadow" role="alert">
          <div class="d-flex">
            <div class="toast-body">${esc(message)}</div>
            <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      `);
      const el = $(id);
      const t = new bootstrap.Toast(el, { delay: 3800 });
      t.show();
      el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    function routeFromUrl(){
      const search = new URLSearchParams(location.search);
      if(search.get('resetar_senha') === 'true') return 'resetar-senha';
      if(location.hash.includes('type=recovery')) return 'resetar-senha';
      return location.hash.replace('#/','').split('?')[0] || (auth.token ? 'dashboard' : 'login');
    }

    function recoveryTokens(){
      const hash = location.hash.startsWith('#') ? location.hash.slice(1) : location.hash;
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get('access_token'),
        refresh_token: params.get('refresh_token')
      };
    }

    function renderAuth(mode='login', error=''){
      const forgot = mode === 'esqueci-senha';
      const reset = mode === 'resetar-senha';
      root.innerHTML = `
        <main class="auth-page">
          <section class="auth-box">
            <div class="auth-card">
              ${forgot ? forgotForm(error) : reset ? resetForm(error) : loginForm(error)}
            </div>
          </section>
        </main>`;
      if(forgot) $('forgotForm').addEventListener('submit', handleForgot);
      else if(reset) $('resetForm').addEventListener('submit', handleReset);
      else $('loginForm').addEventListener('submit', handleLogin);
      bindPhoneFields(root);
    }

    function loginForm(error){
      return `<form id="loginForm" class="vstack gap-3">
        <label class="form-label">Telefone
          <span class="phone-field">
            <span class="phone-prefix">BR +55</span>
            <input class="form-control" name="identificador" type="tel" inputmode="numeric" autocomplete="tel-national" placeholder="(11) 99999-9999" maxlength="15" data-phone required>
          </span>
          <span class="phone-help">Use o número corporativo cadastrado no sistema.</span>
        </label>
        <label class="form-label">Senha<input class="form-control mt-1" name="senha" type="password" autocomplete="current-password" required></label>
        ${error ? `<div class="alert alert-danger mb-0">${esc(error)}</div>` : ''}
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Entrar</button>
        <a class="text-center small fw-semibold" href="#/esqueci-senha">Esqueci minha senha</a>
      </form>`;
    }

    function forgotForm(error){
      return `<form id="forgotForm" class="vstack gap-3">
        <label class="form-label">Email<input class="form-control mt-1" name="email" type="email" autocomplete="email" required></label>
        ${error ? `<div class="alert alert-danger mb-0">${esc(error)}</div>` : ''}

        <a class="text-center small fw-semibold" href="#/login">Voltar ao login</a>
      </form>`;
    }

    function resetForm(error){
      const t = recoveryTokens();
      return `<form id="resetForm" class="vstack gap-3">
        <label class="form-label">Nova senha<input class="form-control mt-1" name="senha" type="password" minlength="6" required></label>
        <label class="form-label">Confirmar senha<input class="form-control mt-1" name="confirmar_senha" type="password" minlength="6" required></label>
        <input type="hidden" name="access_token" value="${esc(t.access_token || '')}">
        <input type="hidden" name="refresh_token" value="${esc(t.refresh_token || '')}">
        ${error ? `<div class="alert alert-danger mb-0">${esc(error)}</div>` : ''}
        <div id="resetMessage"></div>
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-key me-2"></i>Salvar nova senha</button>
        <a class="text-center small fw-semibold" href="#/login">Voltar ao login</a>
      </form>`;
    }

    async function handleLogin(e){
      e.preventDefault();
      const form = e.currentTarget;
      const btn = form.querySelector('button');
      const data = Object.fromEntries(new FormData(form));

      if(!phoneIsValid(data.identificador)){
        renderAuth('login', 'Informe um telefone válido.');
        return;
      }

      data.identificador = normalizePhone(data.identificador);

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';
      try{
        const res = await fetch(`${API_URL}/auth/login`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(data)
        });
        const body = await res.json();
        if(!res.ok) throw new Error(body.erro || body.mensagem || 'Erro ao fazer login');
        saveSession(body);
        location.hash = '#/dashboard';
        renderShell();
        await navigate('dashboard', true);
      }catch(err){
        renderAuth('login', err.message);
      }
    }

    async function handleForgot(e){
      e.preventDefault();
      const box = $('forgotMessage');
      try{
        await api('/auth/forgot-password', { method:'POST', body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget))) });
        box.innerHTML = '<div class="alert alert-success mb-0">Se o email estiver cadastrado, as instruções serão enviadas.</div>';
      }catch(err){
        box.innerHTML = `<div class="alert alert-danger mb-0">${esc(err.message)}</div>`;
      }
    }

    async function handleReset(e){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.currentTarget));
      const box = $('resetMessage');
      if(data.senha !== data.confirmar_senha){
        box.innerHTML = '<div class="alert alert-danger mb-0">As senhas não conferem.</div>';
        return;
      }
      if(!data.access_token || !data.refresh_token){
        box.innerHTML = '<div class="alert alert-danger mb-0">Link inválido ou expirado.</div>';
        return;
      }
      try{
        await api('/auth/reset-password', { method:'POST', body:JSON.stringify({access_token:data.access_token, refresh_token:data.refresh_token, senha:data.senha}) });
        box.innerHTML = '<div class="alert alert-success mb-0">Senha alterada com sucesso. Faça login novamente.</div>';
        clearSession();
        setTimeout(() => { location.hash = '#/login'; renderAuth('login'); }, 1400);
      }catch(err){
        box.innerHTML = `<div class="alert alert-danger mb-0">${esc(err.message)}</div>`;
      }
    }

      document.querySelectorAll('[data-route]').forEach(a => a.addEventListener('click', (e) => {

      $('app').innerHTML = `<div class="row g-3">

    async function navigate(page, fresh=false){
      cleanupBootstrapArtifacts();
      removeStaleModals();

      const allowed = visiblePages().map(([id]) => id);

      if(!allowed.includes(page)){
        page = 'dashboard';
        history.replaceState(null, '', '#/dashboard');
      }

      if(page === 'usuarios' && !isAdmin()){
        page = 'dashboard';
        history.replaceState(null, '', '#/dashboard');
        toast('Apenas administradores podem acessar usuários.', 'warning');

      state.page = page;
      setMeta(page);
      loading();
      try{

          dashboard: renderDashboard,
          produtos: renderProdutos,
          estoque: renderEstoque,
          solicitacoes: renderSolicitacoes,
          devolucoes: renderDevolucoes,
          cadastros: renderCadastros,
          usuarios: renderUsuarios,
        }[page] || renderDashboard;
        await render(fresh);

    function openAtender(id){
      const form = $('atenderForm');
      if(!form){
        toast('Formulário de atendimento não encontrado. Atualize a página e tente novamente.', 'danger');
        return;
      }

      form.reset();

      const inputSolicitacao = form.querySelector('[name="solicitacao_id"]');
      if(!inputSolicitacao){
        toast('Campo da solicitação não encontrado.', 'danger');
        return;
      }

      inputSolicitacao.value = id;
      showModal('atenderModal');

    async function atenderSol(e){
      e.preventDefault();

      const form = e.currentTarget;
      const data = Object.fromEntries(new FormData(form));

      if(!data.solicitacao_id){
        toast('Solicitação não identificada para atendimento.', 'danger');
        return;
      }

      if(!data.local_estoque_id){
        toast('Selecione o local de estoque para atender a solicitação.', 'warning');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"], .btn-primary');
      const originalText = submitBtn ? submitBtn.innerHTML : '';

      if(submitBtn){
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Atendendo...';
      }

      try{
        await api(`/solicitacoes/${data.solicitacao_id}/atender`, {
          method:'POST',
          body:JSON.stringify({
            local_estoque_id:data.local_estoque_id,
            usuario_id:auth.usuario?.id||null
          })
        });

        invalidate('solicitacoes','saldo');
        await hideModal('atenderModal');
        toast('Solicitação atendida com sucesso.');
        await navigate('solicitacoes', true);
        cleanupBootstrapArtifacts();
      }catch(err){
        toast(err.message,'danger');
      }finally{
        if(submitBtn){
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      }
    }

        toast('Cadastro salvo.');
        await navigate('cadastros', true);
      }catch(err){toast(err.message,'danger')}
    }

    async function saveCentro(e){
      e.preventDefault();
      try{
        await api('/cadastros/centros-custo',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget)))});
        invalidate('centros');
        toast('Centro de custo salvo.');
        await navigate('cadastros', true);
      }catch(err){toast(err.message,'danger')}
    }

    async function renderUsuarios(fresh=false){
      if(!isAdmin()){
        $('app').innerHTML = `<div class="surface p-4"><div class="empty"><i class="bi bi-shield-lock"></i><h5>Acesso restrito</h5><p>Apenas administradores podem cadastrar usuários.</p></div></div>`;
        return;
      }

      const d = await load(['usuarios','setores','centros'], fresh);
      $('app').innerHTML = `<div class="surface p-3 p-md-4"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3"><div><h5 class="fw-bold mb-1">Usuários</h5><p class="small text-secondary mb-0">Perfis e permissões.</p></div><button class="btn btn-primary" onclick="showModal('userModal')"><i class="bi bi-person-plus me-1"></i>Novo</button></div>${tableUsuarios(d.usuarios)}</div>${userModal(d)}`;
      $('userForm').addEventListener('submit', saveUser);
      bindPhoneFields($('userModal'));
    }

    function tableUsuarios(items){
      if(!items.length) return empty('Nenhum usuário cadastrado','bi-people');
      return `<div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Nome</th><th>Email</th><th>Perfil</th><th>Cargo</th><th>Status</th></tr></thead><tbody>${items.map(u=>`<tr><td class="fw-bold">${esc(u.nome||'-')}</td><td>${esc(u.email||'-')}</td><td><span class="soft soft-primary">${esc(u.perfil||'-')}</span></td><td>${esc(u.cargo||'-')}</td><td>${u.ativo?'<span class="soft soft-success">Ativo</span>':'<span class="soft soft-danger">Inativo</span>'}</td></tr>`).join('')}</tbody></table></div>`;
    }

    function userModal(d){
      return `<div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><form id="userForm">
        <div class="modal-header"><div><h5 class="modal-title fw-bold">Novo usuário</h5><p class="small text-secondary mb-0">O acesso será criado automaticamente.</p></div><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><div class="row g-3">
          <div class="col-md-6"><label class="form-label">Nome<input class="form-control mt-1" name="nome" required></label></div>
          <div class="col-md-6"><label class="form-label">Email<input class="form-control mt-1" name="email" type="email" required></label></div>
          <div class="col-md-4"><label class="form-label">Senha inicial<input class="form-control mt-1" name="senha" type="password" autocomplete="new-password" minlength="8" required></label></div>
          <div class="col-md-4"><label class="form-label">Perfil<select class="form-select mt-1" name="perfil" required><option value="usuario">Usuário</option><option value="admin">Admin</option></select></label></div>
          <div class="col-md-4"><label class="form-label">Cargo<input class="form-control mt-1" name="cargo"></label></div>
          <div class="col-md-4"><label class="form-label">Telefone
            <span class="phone-field">
              <span class="phone-prefix">BR +55</span>
              <input class="form-control" name="telefone" type="tel" inputmode="numeric" autocomplete="tel-national" placeholder="(11) 99999-9999" maxlength="15" data-phone required>
            </span>
          </label></div>
          <div class="col-md-6"><label class="form-label">Setor<select class="form-select mt-1" name="setor_id"><option value="">Selecione</option>${options(d.setores)}</select></label></div>
          <div class="col-md-6"><label class="form-label">Centro<select class="form-select mt-1" name="centro_custo_id"><option value="">Selecione</option>${d.centros.map(c=>`<option value="${esc(c.id)}">${esc(c.codigo||'')} ${esc(c.nome||'')}</option>`).join('')}</select></label></div>
        </div></div>
        <div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary">Salvar</button></div>
      </form></div></div></div>`;
    }

    async function saveUser(e){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.currentTarget));

      if(!phoneIsValid(data.telefone)){
        toast('Informe um telefone válido para o usuário.', 'warning');
        return;
      }

      data.telefone = normalizePhone(data.telefone);

      try{
        await api('/usuarios',{method:'POST',body:JSON.stringify({...data,setor_id:data.setor_id||null,centro_custo_id:data.centro_custo_id||null,ativo:true})});
        invalidate('usuarios');
        await hideModal('userModal');
        toast('Usuário criado.');
        await navigate('usuarios', true);
      }catch(err){toast(err.message,'danger')}
    }

    function cleanupBootstrapArtifacts(){
      document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
      document.body.classList.remove('modal-open');
      document.body.style.removeProperty('overflow');
      document.body.style.removeProperty('padding-right');
      document.body.removeAttribute('data-bs-overflow');
      document.body.removeAttribute('data-bs-padding-right');
    }

    function removeStaleModals(){
      document.querySelectorAll('body > .modal').forEach(el => {
        bootstrap.Modal.getInstance(el)?.dispose();
        el.remove();
      });
    }

    function moveModalToBody(id){
      const el = $(id);
      if(!el) return null;

      if(el.parentElement !== document.body){
        document.body.appendChild(el);
      }

      return el;
    }

    function showModal(id){
      cleanupBootstrapArtifacts();

      const el = moveModalToBody(id);
      if(!el){
        toast('Janela não encontrada. Atualize a página e tente novamente.', 'danger');
        return;
      }

      bootstrap.Modal.getOrCreateInstance(el, {
        backdrop: true,
        keyboard: true,
        focus: true
      }).show();
    }

    function hideModal(id){
      const el = $(id);
      if(!el){
        cleanupBootstrapArtifacts();
        return Promise.resolve();
      }

      return new Promise((resolve) => {
        let resolved = false;
        const finish = () => {
          if(resolved) return;
          resolved = true;
          el.removeEventListener('hidden.bs.modal', finish);
          cleanupBootstrapArtifacts();
          resolve();
        };

        el.addEventListener('hidden.bs.modal', finish, { once:true });
        const m = bootstrap.Modal.getInstance(el) || bootstrap.Modal.getOrCreateInstance(el);

        if(m) m.hide();
        else finish();

        setTimeout(finish, 260);
      });
    }

    document.addEventListener('hidden.bs.modal', () => {
      setTimeout(cleanupBootstrapArtifacts, 80);
    });

    function boot(){
      if (window.applySystemTheme) window.applySystemTheme();
      const route = routeFromUrl();
      if(['login','esqueci-senha','resetar-senha'].includes(route)) return renderAuth(route);
      if(!auth.token) return renderAuth('login');
      renderShell();
      navigate(visiblePages().some(p=>p[0]===route) ? route : 'dashboard');
    }

    window.addEventListener('hashchange', boot);
    window.addEventListener('popstate', boot);
    window.navigate = navigate;
    window.showModal = showModal;
    window.openAtender = openAtender;

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
